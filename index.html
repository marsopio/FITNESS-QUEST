<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OVERDRIVE V5.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f3ff; --pink: #ff0055; --violet: #bc13fe; --dark: #020205; 
            --neon-glow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        body { 
            background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; margin: 0;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* FX Scanlines */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(var(--cyan) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--cyan) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.03;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 40px; } }

        .glass-card { 
            background: rgba(8, 8, 16, 0.92); backdrop-filter: blur(10px); 
            border: 1px solid rgba(0, 243, 255, 0.15); box-shadow: var(--neon-glow);
        }

        .cyber-btn {
            clip-path: polygon(8% 0, 100% 0, 100% 75%, 92% 100%, 0 100%, 0 25%);
            transition: all 0.2s ease;
        }

        .avatar-container { position: relative; width: 140px; height: 140px; margin: auto; }
        .avatar-ring {
            position: absolute; inset: 0; border: 1px solid var(--violet);
            border-radius: 50%; animation: rotate-ring 12s linear infinite; opacity: 0.3;
        }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .avatar-float { animation: float 4s ease-in-out infinite; }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const RANK_NAMES = [
            "NOBODY", "SCRAP", "WANDERER", "NOMAD", "STREET-RAT", "GLITCHER", "COBALT",
            "REBEL", "CYPHER", "HACKER", "PHANTOM", "ENFORCER", "SENTINEL", "SPECTRE",
            "TITAN", "APEX", "ZENITH", "OVERLORD", "NEXUS-GOD", "ULTRAMAN"
        ];

        const App = () => {
            const [tab, setTab] = useState('train');
            const [completed, setCompleted] = useState({});
            const [loading, setLoading] = useState(true);

            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('FQ_PROD_V5');
                return saved ? JSON.parse(saved) : { 
                    user: null, trophies: 0, xp: 0, level: 1, streak: 0, 
                    dailyWorkouts: 0, lastDate: new Date().toDateString(), cycleDay: 0,
                    combatPower: 100
                };
            });

            // Sauvegarde et gestion du temps (Cycle 7 jours)
            useEffect(() => {
                const timer = setTimeout(() => setLoading(false), 1500);
                localStorage.setItem('FQ_PROD_V5', JSON.stringify(state));
                
                const today = new Date().toDateString();
                if (state.lastDate !== today) {
                    const wasActive = state.dailyWorkouts > 0;
                    setState(s => ({
                        ...s,
                        dailyWorkouts: 0,
                        lastDate: today,
                        cycleDay: (s.cycleDay + 1) % 7,
                        streak: wasActive ? s.streak + 1 : 0
                    }));
                }
                return () => clearTimeout(timer);
            }, [state]);

            const currentRank = RANK_NAMES[Math.min(Math.floor(state.level / 3), RANK_NAMES.length - 1)];
            const isRestDay = state.cycleDay >= 4;

            const handleQuestToggle = (id) => {
                setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const finalizeSession = () => {
                if (Object.keys(completed).length < 4) return;
                
                const bonus = state.dailyWorkouts === 0 ? 15 : 10;
                setState(s => {
                    let newXP = s.xp + 40;
                    let newLevel = s.level;
                    if (newXP >= 100) {
                        newLevel++;
                        newXP = 0;
                    }
                    return {
                        ...s,
                        trophies: s.trophies + bonus,
                        dailyWorkouts: s.dailyWorkouts + 1,
                        xp: newXP,
                        level: newLevel,
                        combatPower: s.combatPower + 7
                    };
                });
                setCompleted({});
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <motion.div animate={{ opacity: [0, 1, 0] }} transition={{ repeat: Infinity, duration: 1.5 }} className="font-orbitron text-cyan-400 tracking-[1em]">LOADING_SYSTEM...</motion.div>
                </div>
            );

            if (!state.user) return (
                <div className="h-screen flex items-center justify-center p-8">
                    <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="glass-card p-10 rounded-3xl w-full max-w-sm text-center">
                        <h1 className="font-orbitron text-2xl font-black mb-2">IDENTIFICATION</h1>
                        <p className="text-[9px] text-cyan-500 uppercase tracking-widest mb-10">Protocole d'accès Pilote</p>
                        <input id="pilotID" type="text" placeholder="ID_UNITÉ" className="w-full bg-white/5 border-b border-cyan-500 p-3 font-orbitron text-white outline-none text-center mb-8 uppercase" />
                        <button onClick={() => {
                            const v = document.getElementById('pilotID').value;
                            if(v) setState(s => ({...s, user: v.toUpperCase()}));
                        }} className="cyber-btn bg-cyan-500 text-black w-full py-4 font-black text-sm">INITIALISER CORE</button>
                    </motion.div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative p-5">
                    
                    {/* TOP STATUS */}
                    <header className="flex justify-between items-start mb-6 glass-card p-5 rounded-2xl border-l-2 border-cyan-500">
                        <div>
                            <div className="text-[8px] font-bold text-violet-500 tracking-widest uppercase">{currentRank}</div>
                            <h2 className="font-orbitron text-xl font-black">{state.user}</h2>
                            <div className="flex gap-1 mt-1">
                                {[...Array(7)].map((_, i) => (
                                    <div key={i} className={`h-1 w-3 rounded-full ${i <= state.cycleDay ? (isRestDay ? 'bg-violet-500' : 'bg-cyan-500') : 'bg-white/10'}`} />
                                ))}
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-orbitron text-2xl font-black text-cyan-400">{state.trophies}🏆</div>
                            <div className="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">LVL {state.level}</div>
                        </div>
                    </header>

                    {/* XP SYSTEM */}
                    <div className="mb-8 px-1">
                        <div className="flex justify-between text-[8px] font-black text-cyan-500 uppercase mb-1">
                            <span>Synchro Core</span>
                            <span>{state.xp}%</span>
                        </div>
                        <div className="h-1 w-full bg-gray-900 rounded-full overflow-hidden">
                            <motion.div animate={{ width: `${state.xp}%` }} className="h-full bg-gradient-to-r from-cyan-500 to-violet-500" />
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto custom-scroll pb-24">
                        <AnimatePresence mode="wait">
                            {tab === 'train' ? (
                                <motion.div key="train" initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 10 }}>
                                    {isRestDay ? (
                                        <div className="glass-card p-10 rounded-3xl text-center border-violet-500/50">
                                            <div className="text-5xl mb-6 avatar-float">💎</div>
                                            <h3 className="font-orbitron text-xl text-violet-400 mb-2 uppercase">Récupération_Active</h3>
                                            <p className="text-xs text-gray-500 mb-8 leading-relaxed">Phase de reconstruction moléculaire. Entraînement suspendu. Profite de ce repos pour stabiliser tes circuits.</p>
                                            <div className="p-4 bg-violet-500/10 rounded-xl border border-violet-500/20">
                                                <p className="text-[10px] text-violet-300 uppercase font-black">Bonus de Prochain Cycle</p>
                                                <p className="text-lg font-orbitron">+25% Power Gain</p>
                                            </div>
                                        </div>
                                    ) : state.dailyWorkouts >= 2 ? (
                                        <div className="glass-card p-12 rounded-3xl text-center border-pink-500/50">
                                            <div className="text-4xl mb-4">🔒</div>
                                            <p className="font-orbitron text-pink-500 uppercase text-sm">Quota Journalier Atteint</p>
                                            <p className="text-[9px] text-gray-600 mt-2 uppercase tracking-widest">Réinitialisation à Minuit</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center px-2 mb-4">
                                                <p className="text-[10px] font-black text-cyan-500 uppercase tracking-widest">// Mission Jour {state.cycleDay+1}</p>
                                                <p className="text-[9px] text-gray-500 uppercase">Sess. {state.dailyWorkouts+1}/2</p>
                                            </div>
                                            {[1, 2, 3, 4].map(i => (
                                                <div key={i} onClick={() => handleQuestToggle(i)} className={`glass-card p-5 rounded-xl flex justify-between items-center border-l-2 transition-all cursor-pointer ${completed[i] ? 'border-white bg-white/5 opacity-100' : 'border-cyan-500/50 opacity-40'}`}>
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-orbitron text-xs text-cyan-400">0{i}</span>
                                                        <span className="font-orbitron text-sm uppercase tracking-tighter">PROTOCOLE_ACTION_{i}</span>
                                                    </div>
                                                    <div className={`w-5 h-5 border flex items-center justify-center ${completed[i] ? 'bg-cyan-400 border-white' : 'border-cyan-500'}`}>
                                                        {completed[i] && <span className="text-[10px] text-black font-black">✓</span>}
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={finalizeSession} className={`w-full py-5 mt-4 cyber-btn font-black tracking-[0.2em] text-sm ${Object.keys(completed).length === 4 ? 'bg-white text-black' : 'bg-white/5 text-white/10 pointer-events-none'}`}>
                                                TRANSMETTRE_LOGS
                                            </button>
                                        </div>
                                    )}
                                </motion.div>
                            ) : (
                                <motion.div key="profile" initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="text-center">
                                    <div className="glass-card p-8 rounded-3xl mb-6 relative overflow-hidden">
                                        <div className="avatar-container mb-6">
                                            <div className="avatar-ring" style={{ borderColor: isRestDay ? 'var(--violet)' : 'var(--cyan)' }}></div>
                                            <svg viewBox="0 0 100 100" className="avatar-float w-full h-full p-4">
                                                <path d="M30 40 Q30 20 50 20 Q70 20 70 40 L75 75 Q50 85 25 75 Z" fill="#080810" stroke={isRestDay ? "#bc13fe" : "#00f3ff"} strokeWidth="2" />
                                                <rect x="30" y="42" width="40" height="10" fill={isRestDay ? "#bc13fe" : "#00f3ff"} opacity="0.5" />
                                                <path d="M45 70 L55 70" stroke="white" strokeWidth="1" opacity="0.3" />
                                            </svg>
                                        </div>
                                        <h3 className="font-orbitron text-2xl font-black mb-1 tracking-tighter">{state.user}</h3>
                                        <p className="text-violet-500 text-[10px] font-bold uppercase tracking-widest mb-6">{currentRank}</p>
                                        
                                        <div className="grid grid-cols-2 gap-3 mt-4">
                                            <div className="p-4 bg-white/5 rounded-xl border border-white/10">
                                                <p className="text-[8px] text-gray-500 uppercase mb-1">Combat Power</p>
                                                <p className="font-orbitron text-xl text-pink-500">{state.combatPower}</p>
                                            </div>
                                            <div className="p-4 bg-white/5 rounded-xl border border-white/10">
                                                <p className="text-[8px] text-gray-500 uppercase mb-1">Série</p>
                                                <p className="font-orbitron text-xl text-cyan-400">{state.streak}j</p>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => alert("Marketplace hors ligne")} className="w-full glass-card p-4 rounded-xl text-white/40 font-orbitron text-[10px] flex items-center justify-between px-6 border-dashed border-white/20">
                                        <span>🛒 MARKETPLACE</span>
                                        <span className="text-[8px] bg-white/10 px-2 py-1 rounded">LOCKED</span>
                                    </button>
                                    <button onClick={() => {if(confirm("WIPE DATA?")) {localStorage.clear(); location.reload();}}} className="mt-10 text-[9px] opacity-20 uppercase tracking-[0.4em] hover:opacity-100 transition-opacity">Hard_System_Reset</button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* NAVIGATION */}
                    <nav className="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-2xl flex items-center justify-around z-50 border-cyan-500/30">
                        <button onClick={() => setTab('train')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'train' ? 'text-cyan-400 scale-110 drop-shadow-[0_0_10px_#00f3ff]' : 'opacity-30'}`}>
                            <span className="text-2xl">{isRestDay ? '💎' : '⚡'}</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Mission</span>
                        </button>
                        <div className="w-px h-8 bg-white/10" />
                        <button onClick={() => setTab('profile')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'profile' ? 'text-violet-400 scale-110 drop-shadow-[0_0_10px_#bc13fe]' : 'opacity-30'}`}>
                            <span className="text-2xl">👤</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Core</span>
                        </button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
