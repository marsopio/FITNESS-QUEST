<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OVERDRIVE V4.2</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f3ff; --pink: #ff0055; --violet: #bc13fe; --dark: #020205; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        body { 
            background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; margin: 0;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* Effet de Scanline permanent */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* Grille animée 3D */
        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(var(--cyan) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--cyan) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.05;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* Styles des Conteneurs */
        .glass-card { 
            background: rgba(10, 10, 20, 0.95); backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: var(--neon-glow);
        }

        .cyber-btn {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .cyber-btn:active { transform: scale(0.95) skewX(-5deg); }
        .cyber-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .cyber-btn:hover::after { left: 100%; }

        /* Avatar spécifique */
        .avatar-container { position: relative; width: 150px; height: 150px; margin: auto; }
        .avatar-ring {
            position: absolute; inset: 0; border: 2px dashed var(--violet);
            border-radius: 50%; animation: rotate-ring 10s linear infinite;
        }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glitch-text { animation: glitch 3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); text-shadow: 2px 0 var(--pink); }
            4% { transform: translate(2px, -2px); text-shadow: -2px 0 var(--cyan); }
            6% { transform: translate(0); }
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Configuration étendue des rangs (100 paliers simulés par segments)
        const RANK_NAMES = [
            "NOBODY", "DUST", "GLITCH", "SCRAP", "WANDERER", "NOMAD", "STREET-RUNNER",
            "REBEL", "CYPHER", "HACKER", "PHANTOM", "ENFORCER", "SENTINEL", "SPECTRE",
            "TITAN", "APEX", "ZENITH", "OVERLORD", "NEXUS-GOD", "ULTRAMAN"
        ];

        // --- COMPOSANT DE DÉTAIL : STATS DE COMBAT ---
        const StatLine = ({ label, value, color }) => (
            <div className="flex justify-between items-center text-[10px] mb-1">
                <span className="text-gray-500 font-bold uppercase">{label}</span>
                <span className="font-orbitron" style={{ color }}>{value}</span>
            </div>
        );

        // --- COMPOSANT AVATAR DÉTAILLÉ ---
        const CyberAvatar = ({ level, cycleDay }) => {
            const isRest = cycleDay >= 4;
            return (
                <div className="avatar-container py-8">
                    <div className="avatar-ring" style={{ borderColor: isRest ? 'var(--violet)' : 'var(--cyan)' }}></div>
                    <div className="avatar-ring" style={{ animationDuration: '15s', animationDirection: 'reverse', opacity: 0.5 }}></div>
                    <svg viewBox="0 0 100 100" className="w-full h-full avatar-float">
                        <defs>
                            <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="var(--cyan)" />
                                <stop offset="100%" stopColor="var(--violet)" />
                            </linearGradient>
                        </defs>
                        {/* Structure Tête */}
                        <path d="M30 40 Q30 20 50 20 Q70 20 70 40 L75 75 Q50 85 25 75 Z" fill="#0a0a14" stroke="url(#cyberGrad)" strokeWidth="2" />
                        {/* Visière Cyber */}
                        <rect x="28" y="42" width="44" height="12" fill={isRest ? "#bc13fe" : "#00f3ff"} className="opacity-80 shadow-lg" />
                        <rect x="28" y="42" width="44" height="2" fill="white" opacity="0.5" />
                        {/* Détails mentonnière */}
                        <path d="M40 70 L60 70 L55 75 L45 75 Z" fill="var(--pink)" opacity="0.6" />
                        {/* Antennes d'interface */}
                        <line x1="70" y1="40" x2="80" y2="30" stroke="var(--cyan)" strokeWidth="1" />
                        <circle cx="80" cy="30" r="1.5" fill="white" />
                    </svg>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('train');
            const [loading, setLoading] = useState(true);
            const [completed, setCompleted] = useState({});
            const [showConstruction, setShowConstruction] = useState(false);

            // État persistant avec logique de cycle
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('FQ_V4_ULTRA');
                return saved ? JSON.parse(saved) : { 
                    user: null, trophies: 0, xp: 0, level: 1, streak: 0, 
                    dailyWorkouts: 0, lastDate: null, cycleDay: 0,
                    totalCalories: 0, combatPower: 120
                };
            });

            // Synchronisation et Vérification du temps
            useEffect(() => {
                const timer = setTimeout(() => setLoading(false), 2000);
                localStorage.setItem('FQ_V4_ULTRA', JSON.stringify(state));
                
                const today = new Date().toDateString();
                if (state.lastDate !== today) {
                    const yesterday = new Date(); 
                    yesterday.setDate(yesterday.getDate() - 1);
                    const completedYesterday = state.dailyWorkouts > 0;
                    
                    setState(s => ({ 
                        ...s, 
                        dailyWorkouts: 0, 
                        lastDate: today,
                        cycleDay: completedYesterday ? (s.cycleDay + 1) % 7 : s.cycleDay,
                        streak: completedYesterday ? s.streak : 0
                    }));
                }
                return () => clearTimeout(timer);
            }, [state]);

            const currentRank = useMemo(() => {
                const idx = Math.floor(state.level / 5);
                return RANK_NAMES[idx] || "DIVINITY";
            }, [state.level]);

            const handleFinalize = () => {
                if (Object.keys(completed).length < 4) return;
                const isFirst = state.dailyWorkouts === 0;
                const rewardTrophies = isFirst ? 15 : 10;
                
                setState(s => ({
                    ...s,
                    trophies: s.trophies + rewardTrophies,
                    dailyWorkouts: s.dailyWorkouts + 1,
                    xp: s.xp + 25,
                    combatPower: s.combatPower + 5,
                    streak: isFirst ? s.streak + 1 : s.streak
                }));

                // Logique de Level Up
                if (state.xp >= state.level * 100) {
                    setState(s => ({ ...s, level: s.level + 1, xp: 0 }));
                    alert("SYSTEM UPGRADE : LEVEL " + (state.level + 1));
                }
                setCompleted({});
            };

            // Écran de chargement
            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black">
                    <motion.div 
                        initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                        className="font-orbitron text-cyan-400 text-xl tracking-[0.5em] mb-4"
                    >
                        BOOTING_OVERDRIVE...
                    </motion.div>
                    <div className="w-48 h-1 bg-gray-900 overflow-hidden">
                        <motion.div 
                            initial={{ x: -200 }} animate={{ x: 200 }} 
                            transition={{ repeat: Infinity, duration: 1.5 }}
                            className="w-full h-full bg-cyan-500"
                        />
                    </div>
                </div>
            );

            // Écran d'identification
            if (!state.user) return (
                <div className="h-screen flex items-center justify-center p-8 bg-[#020205]">
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="glass-card p-10 rounded-3xl w-full max-w-sm text-center border-2 border-cyan-500/50">
                        <h1 className="font-orbitron text-3xl font-black text-white mb-2">IDENTIFICATION</h1>
                        <p className="text-cyan-500 text-[10px] tracking-widest mb-10 uppercase">Nouvelle Unité Détectée</p>
                        <div className="relative mb-10">
                            <input id="userName" type="text" placeholder="ENTREZ ID_PILOTE" className="w-full bg-white/5 border-b-2 border-cyan-500 p-4 font-orbitron text-white outline-none text-center focus:bg-white/10 transition-all" />
                        </div>
                        <button onClick={() => {
                            const val = document.getElementById('userName').value;
                            if(val) setState(s => ({...s, user: val.toUpperCase(), lastDate: new Date().toDateString()}));
                        }} className="cyber-btn bg-cyan-500 text-black w-full py-5 text-xl font-black shadow-[0_0_20px_rgba(0,243,255,0.5)]">ACTIVER_CORE</button>
                    </motion.div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-5 relative">
                    {/* EN-TÊTE SYSTÈME */}
                    <header className="flex justify-between items-start mb-6 glass-card p-5 rounded-2xl border-l-4 border-l-cyan-500">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-bold text-violet-500 tracking-[0.3em] uppercase glitch-text">{currentRank}</span>
                            <h2 className="font-orbitron text-2xl font-black leading-tight tracking-tighter">{state.user}</h2>
                            <div className="flex gap-2 mt-1">
                                <div className="h-1 w-8 bg-cyan-500"></div>
                                <div className="h-1 w-4 bg-violet-500"></div>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-orbitron text-3xl font-black text-cyan-400 drop-shadow-[0_0_8px_#00f3ff]">{state.trophies}<span className="text-sm ml-1 text-white">🏆</span></div>
                            <div className="text-[10px] font-bold text-gray-500 uppercase">LVL {state.level} — J{state.cycleDay + 1}/7</div>
                        </div>
                    </header>

                    {/* BARRE DE PROGRESSION XP */}
                    <div className="px-1 mb-8">
                        <div className="flex justify-between text-[9px] font-bold uppercase mb-1 text-cyan-400">
                            <span>Synchro Système</span>
                            <span>{Math.floor((state.xp / (state.level * 100)) * 100)}%</span>
                        </div>
                        <div className="h-1.5 w-full bg-gray-900 rounded-full overflow-hidden border border-white/5">
                            <motion.div 
                                initial={{ width: 0 }}
                                animate={{ width: `${(state.xp / (state.level * 100)) * 100}%` }}
                                className="h-full bg-gradient-to-r from-cyan-500 to-violet-500"
                            />
                        </div>
                    </div>

                    {/* ZONE DE CONTENU PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto custom-scroll pb-24">
                        <AnimatePresence mode="wait">
                            {tab === 'train' ? (
                                <motion.div key="train" initial={{ x: -20, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: 20, opacity: 0 }} className="space-y-4">
                                    {state.cycleDay >= 4 ? (
                                        /* MODE REPOS */
                                        <div className="glass-card p-10 rounded-3xl text-center border-violet-500 shadow-[0_0_20px_rgba(188,19,254,0.2)]">
                                            <div className="text-6xl mb-6">💤</div>
                                            <h3 className="font-orbitron text-2xl text-violet-400 mb-4">MODE RÉCUPÉRATION</h3>
                                            <p className="text-sm text-gray-400 mb-8 leading-relaxed">Phase de reconstruction moléculaire active. Entraînement physique suspendu pour {7 - state.cycleDay} jours.</p>
                                            <div className="space-y-3">
                                                <button onClick={() => alert("Méditation Système : XP +5")} className="w-full py-4 cyber-btn border border-violet-500 text-violet-400 font-bold hover:bg-violet-500/10 uppercase text-xs tracking-widest">Lancer Méditation</button>
                                                <div className="text-[9px] text-gray-600 uppercase tracking-widest">Repos obligatoire : Sécurité Pilote</div>
                                            </div>
                                        </div>
                                    ) : state.dailyWorkouts >= 2 ? (
                                        /* QUOTA ATTEINT */
                                        <div className="glass-card p-10 rounded-3xl text-center border-pink-500">
                                            <div className="text-5xl mb-6">🚫</div>
                                            <h3 className="font-orbitron text-pink-500 text-xl mb-2">QUOTA_MAX</h3>
                                            <p className="text-xs text-gray-400 uppercase tracking-widest">Réinitialisation dans : 14h 22m</p>
                                        </div>
                                    ) : (
                                        /* LISTE DES EXERCICES */
                                        <>
                                            <div className="flex items-center justify-between mb-4">
                                                <span className="text-[10px] font-black text-cyan-500 bg-cyan-500/10 px-3 py-1 rounded-full uppercase">Mission active : Jour {state.cycleDay + 1}</span>
                                                <span className="text-[10px] text-gray-500 uppercase">Session {state.dailyWorkouts + 1}/2</span>
                                            </div>
                                            {[1, 2, 3, 4].map(i => (
                                                <motion.div 
                                                    whileTap={{ scale: 0.98 }}
                                                    key={i} 
                                                    onClick={() => setCompleted(c => ({...c, [i]: !c[i]}))}
                                                    className={`glass-card p-6 rounded-2xl flex justify-between items-center border-l-4 transition-all duration-300 ${completed[i] ? 'border-l-white bg-white/10 opacity-100 shadow-white/20' : 'border-l-cyan-500 opacity-60'}`}
                                                >
                                                    <div className="flex items-center gap-5">
                                                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center font-orbitron text-xl ${completed[i] ? 'bg-white text-black' : 'bg-cyan-500/20 text-cyan-400'}`}>
                                                            {i}
                                                        </div>
                                                        <div>
                                                            <p className="text-[10px] font-black text-cyan-400 uppercase tracking-widest">Protocole_{i < 10 ? '0'+i : i}</p>
                                                            <p className="text-lg font-orbitron font-bold">TASK_COMMANDER</p>
                                                        </div>
                                                    </div>
                                                    <div className={`w-6 h-6 rounded-sm border-2 flex items-center justify-center ${completed[i] ? 'bg-cyan-500 border-cyan-400' : 'border-white/20'}`}>
                                                        {completed[i] && <span className="text-black font-black text-xs">✓</span>}
                                                    </div>
                                                </motion.div>
                                            ))}
                                            <button 
                                                onClick={handleFinalize}
                                                className={`w-full py-6 mt-6 cyber-btn text-xl font-black tracking-widest ${Object.keys(completed).length === 4 ? 'bg-white text-black shadow-lg shadow-white/30' : 'bg-white/5 text-white/10 pointer-events-none'}`}
                                            >
                                                ENREGISTRER_DONNÉES
                                            </button>
                                        </>
                                    )}
                                </motion.div>
                            ) : (
                                /* ONGLET PROFIL / CORE */
                                <motion.div key="profile" initial={{ x: 20, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: -20, opacity: 0 }} className="text-center">
                                    <div className="glass-card rounded-3xl p-8 mb-6 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 font-orbitron text-[8px] text-cyan-500 opacity-30 uppercase tracking-widest">Hardware v.4.02</div>
                                        <CyberAvatar level={state.level} cycleDay={state.cycleDay} />
                                        <h3 className="font-orbitron text-2xl font-black mt-2 tracking-tighter">{state.user}</h3>
                                        <div className="h-0.5 w-12 bg-violet-500 mx-auto my-3"></div>
                                        
                                        <div className="grid grid-cols-2 gap-4 mt-8">
                                            <div className="bg-black/40 p-4 rounded-xl border border-white/5">
                                                <StatLine label="Série Actuelle" value={state.streak + "j"} color="var(--cyan)" />
                                                <StatLine label="Power Index" value={state.combatPower} color="var(--pink)" />
                                            </div>
                                            <div className="bg-black/40 p-4 rounded-xl border border-white/5">
                                                <StatLine label="Statut" value={state.cycleDay >= 4 ? "Repos" : "Assaut"} color={state.cycleDay >= 4 ? "var(--violet)" : "var(--cyan)"} />
                                                <StatLine label="Prochain Cycle" value={(7-state.cycleDay) + "j"} color="white" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* BOUTON BOUTIQUE (CONSTRUCTION) */}
                                    <button 
                                        onClick={() => setShowConstruction(true)}
                                        className="w-full glass-card p-5 rounded-2xl border-dashed border-violet-500/50 flex items-center justify-between group hover:border-violet-500 transition-all"
                                    >
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl group-hover:rotate-12 transition-transform">🛒</span>
                                            <div className="text-left">
                                                <p className="font-orbitron text-xs font-black text-violet-400">MARKETPLACE</p>
                                                <p className="text-[9px] text-gray-600 uppercase">Équipements & Augmentations</p>
                                            </div>
                                        </div>
                                        <span className="text-[10px] bg-violet-500/20 text-violet-400 px-2 py-1 rounded">LOCKED</span>
                                    </button>

                                    {showConstruction && (
                                        <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-[10px] text-violet-500 mt-4 uppercase font-bold tracking-widest">
                                            Terminal en cours de synchronisation... [Reviens bientôt]
                                        </motion.p>
                                    )}

                                    <button 
                                        onClick={() => { if(confirm("FORMATEUR LE NOYAU ?")) { localStorage.clear(); location.reload(); }}}
                                        className="mt-16 text-[10px] font-black text-pink-500/40 hover:text-pink-500 transition-colors uppercase tracking-[0.4em]"
                                    >
                                        [ WIPE_SYSTEM_DATA ]
                                    </button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* NAVIGATION INFÉRIEURE */}
                    <nav className="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-2xl flex items-center justify-around z-50 border-cyan-500/40">
                        <button onClick={() => setTab('train')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'train' ? 'text-cyan-400 scale-110 drop-shadow-[0_0_8px_#00f3ff]' : 'opacity-30'}`}>
                            <span className="text-2xl">{state.cycleDay >= 4 ? '💤' : '⚡'}</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Mission</span>
                        </button>
                        <div className="w-px h-8 bg-white/10"></div>
                        <button onClick={() => setTab('profile')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'profile' ? 'text-violet-400 scale-110 drop-shadow-[0_0_8px_#bc13fe]' : 'opacity-30'}`}>
                            <span className="text-2xl">👤</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Core</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
