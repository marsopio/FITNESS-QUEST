<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OMNI V15</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f3ff; --pink: #ff0055; --violet: #bc13fe; --dark-bg: #030308;
            --glass: rgba(10, 10, 25, 0.95);
        }
        body { 
            background: var(--dark-bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; margin: 0;
        }
        .font-o { font-family: 'Orbitron', sans-serif; }
        .grid-bg {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px);
            animation: grid-scroll 20s linear infinite;
        }
        @keyframes grid-scroll { from { background-position: 0 0; } to { background-position: 0 50px; } }
        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .cyber-button { clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); transition: 0.2s; }
        .cyber-button:active { transform: scale(0.95); filter: brightness(1.2); }
        .lvl-up-flash { position: fixed; inset: 0; background: white; z-index: 100; pointer-events: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- CONSTANTES ---
        const AVATARS = ["🦾", "🧬", "⚡", "🥷", "🤖", "🔥", "💎", "🌌"];
        const SHOP_DB = [
            { id: 'b1', name: "SÉRUM XP", desc: "+20 XP immédiat", price: 15, type: 'instant' },
            { id: 'b2', name: "RECHARGE CORE", desc: "Reset limite (1/jour)", price: 40, type: 'reset' },
            { id: 'b3', name: "GANT CYBER", desc: "+2 Puissance permanent", price: 60, type: 'stat' },
            { id: 'b4', name: "TITRE GOLD", desc: "Style visuel premium", price: 100, type: 'skin' }
        ];
        const WORKOUTS = {
            PULL: ["Tractions Australiennes", "Négatives", "Pull-ups", "Lestées"],
            PUSH: ["Pompes Inclines", "Classiques", "Diamant", "Archer"],
            LEGS: ["Squats", "Fentes", "Bulgares", "Pistols"]
        };

        // --- SOUND ENGINE (Pas de fichiers requis) ---
        const playSound = (freq = 440, type = 'square', duration = 0.1) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        };

        const App = () => {
            const [view, setView] = useState('train');
            const [showLvlUp, setShowLvlUp] = useState(false);
            const [tasks, setTasks] = useState({});
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem('FQ_CORE_V15');
                return saved ? JSON.parse(saved) : {
                    user: "PILOTE_01", avatar: "🦾", level: 1, xp: 0, trophies: 10, power: 10,
                    inventory: [], dailySessions: 0, lastDate: new Date().toDateString()
                };
            });

            useEffect(() => {
                localStorage.setItem('FQ_CORE_V15', JSON.stringify(db));
            }, [db]);

            const triggerClick = () => playSound(600, 'sine', 0.05);

            // --- LOGIQUE DE JEU ---
            const addXP = (amount) => {
                setDb(prev => {
                    let nextXP = prev.xp + amount;
                    let nextLvl = prev.level;
                    if (nextXP >= 100) {
                        nextLvl++;
                        nextXP -= 100;
                        setShowLvlUp(true);
                        playSound(880, 'triangle', 0.3);
                        setTimeout(() => setShowLvlUp(false), 1000);
                    }
                    return { ...prev, xp: nextXP, level: nextLvl };
                });
            };

            const completeSession = () => {
                if (Object.keys(tasks).length < 3) return;
                triggerClick();
                addXP(35);
                setDb(prev => ({ 
                    ...prev, 
                    trophies: prev.trophies + 5, 
                    dailySessions: prev.dailySessions + 1 
                }));
                setTasks({});
                alert("DONNÉES SYNCHRONISÉES : +35 XP / +5 🏆");
            };

            const buyItem = (item) => {
                triggerClick();
                if (db.trophies < item.price) return alert("CRÉDITS INSUFFISANTS");
                
                setDb(prev => {
                    let newTrophies = prev.trophies - item.price;
                    let newPower = prev.power;
                    let newXP = prev.xp;
                    let newSessions = prev.dailySessions;

                    if (item.type === 'stat') newPower += 2;
                    if (item.id === 'b1') { newXP += 20; if(newXP>=100) { /* handle lvl up simplified */ } }
                    if (item.id === 'b2') newSessions = 0;

                    return {
                        ...prev,
                        trophies: newTrophies,
                        power: newPower,
                        xp: newXP,
                        dailySessions: newSessions,
                        inventory: [...prev.inventory, item.id]
                    };
                });
                alert(`${item.name} ACTIVÉ !`);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-4 relative overflow-hidden">
                    <AnimatePresence>
                        {showLvlUp && (
                            <motion.div initial={{opacity:0}} animate={{opacity:0.3}} exit={{opacity:0}} className="lvl-up-flash" />
                        )}
                    </AnimatePresence>

                    {/* HEADER */}
                    <header className="glass-panel p-4 rounded-3xl mb-4 flex justify-between items-center border-l-4 border-cyan-500">
                        <div className="flex gap-3 items-center">
                            <div className="text-3xl bg-white/5 w-12 h-12 flex items-center justify-center rounded-xl border border-white/10">
                                {db.avatar}
                            </div>
                            <div>
                                <h2 className="font-o text-sm tracking-tighter">{db.user}</h2>
                                <div className="flex gap-2 mt-1">
                                    <span className="text-[8px] bg-cyan-500/20 text-cyan-400 px-2 rounded-full font-bold">LVL {db.level}</span>
                                    <span className="text-[8px] bg-pink-500/20 text-pink-400 px-2 rounded-full font-bold">PWR {db.power}</span>
                                </div>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-o text-xl text-yellow-400">{db.trophies}🏆</div>
                            <div className="text-[7px] text-gray-500 tracking-widest uppercase">Crédits</div>
                        </div>
                    </header>

                    {/* XP BAR */}
                    <div className="px-1 mb-6">
                        <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                            <motion.div animate={{width: `${db.xp}%`}} className="h-full bg-cyan-500 shadow-[0_0_10px_#00f3ff]" />
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {view === 'train' && (
                            <motion.div initial={{x:-20, opacity:0}} animate={{x:0, opacity:1}} className="space-y-3">
                                <h3 className="text-[10px] font-black text-cyan-500 tracking-[0.3em] uppercase mb-4 px-1">// MISSIONS_DU_JOUR</h3>
                                {Object.entries(WORKOUTS).map(([key, val]) => (
                                    <div key={key} onClick={() => { triggerClick(); setTasks(p => ({...p, [key]: !p[key]})) }} 
                                         className={`glass-panel p-4 rounded-2xl flex justify-between items-center border-white/5 ${tasks[key] ? 'border-cyan-500/50 bg-cyan-500/5' : ''}`}>
                                        <div>
                                            <div className="text-[8px] text-violet-400 font-bold uppercase">{key}</div>
                                            <div className="font-o text-sm">{val[Math.min(db.level-1, 3)]}</div>
                                        </div>
                                        <div className={`w-6 h-6 rounded border ${tasks[key] ? 'bg-cyan-500 border-white text-black' : 'border-white/20'} flex items-center justify-center text-xs`}>
                                            {tasks[key] ? '✓' : ''}
                                        </div>
                                    </div>
                                ))}
                                <button onClick={completeSession} className="w-full py-4 mt-4 bg-white text-black font-black font-o text-[10px] tracking-[0.3em] cyber-button">
                                    SYNCHRONISER LA SÉANCE
                                </button>
                            </motion.div>
                        )}

                        {view === 'shop' && (
                            <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="grid grid-cols-2 gap-3">
                                <h3 className="col-span-2 text-[10px] font-black text-pink-500 tracking-[0.3em] uppercase px-1">// MARCHÉ_NOIR</h3>
                                {SHOP_DB.map(item => (
                                    <div key={item.id} className="glass-panel p-4 rounded-2xl flex flex-col justify-between h-40 border-pink-500/20">
                                        <div>
                                            <div className="font-o text-[10px] mb-1">{item.name}</div>
                                            <div className="text-[8px] text-gray-500 uppercase leading-tight">{item.desc}</div>
                                        </div>
                                        <button onClick={() => buyItem(item)} className="w-full py-2 bg-pink-500/10 border border-pink-500/50 text-pink-500 font-o text-[9px] rounded-lg">
                                            {item.price} 🏆
                                        </button>
                                    </div>
                                ))}
                            </motion.div>
                        )}

                        {view === 'stats' && (
                            <motion.div initial={{y:20, opacity:0}} animate={{y:0, opacity:1}} className="space-y-6">
                                <div className="glass-panel p-6 rounded-3xl text-center">
                                    <div className="text-5xl mb-4">{db.avatar}</div>
                                    <input 
                                        className="bg-transparent border-b border-cyan-500/30 text-center font-o text-xl outline-none w-full"
                                        value={db.user}
                                        onChange={(e) => setDb(p => ({...p, user: e.target.value.toUpperCase()}))}
                                    />
                                    <div className="grid grid-cols-4 gap-2 mt-6">
                                        {AVATARS.map(a => (
                                            <button key={a} onClick={() => { triggerClick(); setDb(p=>({...p, avatar: a})) }} className="p-2 bg-white/5 rounded-lg hover:bg-cyan-500/20">
                                                {a}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => { if(confirm("RESET?")) localStorage.clear(); location.reload(); }} className="w-full text-[8px] text-red-500/50 tracking-widest font-black uppercase">
                                    [ RÉINITIALISER_SYSTÈME ]
                                </button>
                            </motion.div>
                        )}
                    </main>

                    {/* NAV */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass-panel rounded-full p-1.5 flex gap-1 shadow-2xl">
                        {['train', 'shop', 'stats'].map(m => (
                            <button key={m} onClick={() => { triggerClick(); setView(m) }} 
                                    className={`flex-1 py-3 rounded-full font-o text-[9px] tracking-widest transition-all ${view === m ? 'bg-cyan-500 text-black' : 'text-gray-500'}`}>
                                {m.toUpperCase()}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
