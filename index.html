<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OMNI V15 - NEURAL OVERRIDE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --cyan: #00f3ff; --pink: #ff0055; --violet: #bc13fe; --dark: #030308; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        .font-o { font-family: 'Orbitron', sans-serif; }
        .grid-bg { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px); animation: grid-move 20s linear infinite; }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 50px; } }
        .glass { background: rgba(10, 10, 25, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .cyber-border { border-left: 4px solid var(--cyan); clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%); }
        .cyber-btn { clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); transition: 0.2s; }
        .cyber-btn:active { transform: scale(0.95); filter: hue-rotate(45deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,243,255,0.1); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { to { top: 100%; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- DATABASE ---
        const AVATARS = [
            { id: "a1", icon: "🦾", name: "IRON-CLAD", perk: "+10% Force", cost: 0 },
            { id: "a2", icon: "🧬", name: "BIO-TECH", perk: "+10% Récup", cost: 0 },
            { id: "a3", icon: "⚡", name: "NEON-SPEED", perk: "+10% Agilité", cost: 50 },
            { id: "a4", icon: "🥷", name: "VOID-WALKER", perk: "+10% Crit", cost: 100 },
            { id: "a5", icon: "👹", name: "ONI-PULSE", perk: "Double XP", cost: 250 }
        ];

        const QUESTS = [
            { id: 'q1', title: "Surcharge", goal: 50, type: 'reps', reward: 20, desc: "Faire 50 reps au total" },
            { id: 'q2', title: "Persistance", goal: 2, type: 'sessions', reward: 15, desc: "Finir 2 sessions" },
            { id: 'q3', title: "Élite", goal: 5, type: 'power', reward: 50, desc: "Atteindre 5 Power Levels" }
        ];

        const WORKOUT_DB = {
            PULL: ["Australiennes", "Négatives", "Chin-ups", "Classiques", "Large Grip", "Typewriter"],
            PUSH: ["Pompes Genoux", "Standard", "Diamant", "Archer", "Pseudo-Planche", "One-Arm Prep"],
            DIPS: ["Banc", "Chaise", "Barres Parallèles", "L-Sit Dips", "Profonds", "Lestés"],
            LEGS: ["Squats", "Fentes", "Bulgares", "Cossack", "Jump Squats", "Pistol Squat"]
        };

        const App = () => {
            const [view, setView] = useState('train');
            const [db, setDb] = useState(() => {
                const s = localStorage.getItem('FQ_V15');
                return s ? JSON.parse(s) : {
                    user: null, avatar: "🦾", avatarName: "IRON-CLAD",
                    level: 1, xp: 0, trophies: 10, power: 10,
                    restDays: [], sessionsToday: 0, lastDate: new Date().toDateString(),
                    unlockedAvatars: ["a1", "a2"], settings: { sfx: true, music: false },
                    stats: { totalReps: 0, completedQuests: [], totalSessions: 0 }
                };
            });

            const audioRef = useRef(new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"));

            useEffect(() => {
                localStorage.setItem('FQ_V15', JSON.stringify(db));
                if(db.settings.music) audioRef.current.play().catch(()=>{}); else audioRef.current.pause();
            }, [db]);

            const playSfx = () => { if(db.settings.sfx) new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3").play().catch(()=>{}); };

            const handleAction = (cb) => { playSfx(); cb(); };

            const finalizeSession = (tasks) => {
                if(db.sessionsToday >= 2) return alert("SYSTÈME EN SURCHAUFFE. ATTENDEZ DEMAIN.");
                setDb(p => {
                    let newXp = p.xp + 40;
                    let newLvl = p.level;
                    if(newXp >= 100) { newLvl++; newXp = 0; }
                    return { ...p, xp: newXp, level: newLvl, trophies: p.trophies + 15, sessionsToday: p.sessionsToday + 1, stats: { ...p.stats, totalSessions: p.stats.totalSessions + 1 } };
                });
                alert("DONNÉES SYNCHRONISÉES. +15 TROPHÉES");
            };

            const downloadExe = () => {
                const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "FitnessQuest_Launcher.html";
                a.click();
            };

            if (!db.user) return <Setup onComplete={(data) => setDb(p => ({...p, ...data}))} />;

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-4 relative overflow-hidden">
                    <div className="scanline"></div>
                    
                    {/* TOP BAR */}
                    <div className="glass p-4 rounded-2xl cyber-border mb-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="text-3xl bg-white/5 p-2 rounded-xl border border-cyan-500/30">{db.avatar}</div>
                            <div>
                                <div className="font-o text-xs text-cyan-400">{db.user}</div>
                                <div className="h-1.5 w-24 bg-white/10 rounded-full mt-1 overflow-hidden">
                                    <div className="h-full bg-cyan-500 shadow-[0_0_8px_cyan]" style={{width: `${db.xp}%`}}></div>
                                </div>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-o text-pink-500">{db.trophies} 🏆</div>
                            <div className="text-[8px] tracking-widest text-gray-500 uppercase">Credits_Link</div>
                        </div>
                    </div>

                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        <AnimatePresence mode="wait">
                            {view === 'train' && <Training db={db} onFinish={finalizeSession} playSfx={playSfx}/>}
                            {view === 'quests' && <Quests db={db} setDb={setDb} />}
                            {view === 'avatars' && <AvatarCatalog db={db} setDb={setDb} playSfx={playSfx} />}
                            {view === 'config' && <Settings db={db} setDb={setDb} onDownload={downloadExe} />}
                        </AnimatePresence>
                    </main>

                    {/* NAV */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full p-1.5 flex gap-1 z-50 border border-white/10 shadow-2xl">
                        {['train', 'quests', 'avatars', 'config'].map(m => (
                            <button key={m} onClick={() => handleAction(() => setView(m))} className={`flex-1 py-3 rounded-full font-o text-[8px] tracking-tighter transition-all ${view === m ? 'bg-cyan-500 text-black shadow-[0_0_15px_#00f3ff]' : 'text-gray-500'}`}>
                                {m.toUpperCase()}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const Training = ({ db, onFinish, playSfx }) => {
            const [done, setDone] = useState({});
            const items = Object.entries(WORKOUT_DB);
            return (
                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="space-y-3">
                    <div className="text-[10px] font-black text-cyan-500 tracking-[0.3em] mb-4 uppercase text-center">// Protocoles_Journaliers</div>
                    {items.map(([cat, list]) => (
                        <div key={cat} onClick={() => { playSfx(); setDone(p => ({...p, [cat]: !p[cat]})); }} className={`glass p-4 rounded-xl border-l-2 transition-all ${done[cat] ? 'border-cyan-500 bg-cyan-500/10' : 'border-white/10 opacity-60'}`}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <div className="text-[8px] text-violet-400 font-bold uppercase">{cat}_MODULE</div>
                                    <div className="font-o text-sm">{list[Math.min(db.level - 1, 5)]}</div>
                                </div>
                                <div className={`w-6 h-6 rounded border flex items-center justify-center ${done[cat] ? 'bg-cyan-500 border-none text-black' : 'border-white/20'}`}>
                                    {done[cat] && "✓"}
                                </div>
                            </div>
                        </motion.div>
                    ))}
                    <button onClick={() => Object.keys(done).length === 4 && onFinish(done)} className={`w-full py-5 cyber-btn font-o text-xs mt-4 ${Object.keys(done).length === 4 ? 'bg-white text-black' : 'bg-white/5 text-gray-600'}`}>
                        TRANSMETTRE_DONNEES
                    </button>
                </motion.div>
            );
        };

        const Quests = ({ db, setDb }) => (
            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="space-y-4">
                <div className="text-[10px] font-black text-pink-500 tracking-[0.3em] mb-4 uppercase text-center">// Objectifs_Reseau</div>
                {QUESTS.map(q => (
                    <div key={q.id} className="glass p-5 rounded-2xl relative overflow-hidden border border-pink-500/20">
                        <div className="flex justify-between mb-2">
                            <h4 className="font-o text-sm text-pink-500">{q.title}</h4>
                            <span className="text-xs text-white">{q.reward} 🏆</span>
                        </div>
                        <p className="text-[10px] text-gray-400 uppercase leading-tight mb-4">{q.desc}</p>
                        <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                            <div className="h-full bg-pink-600" style={{width: '30%'}}></div>
                        </div>
                    </div>
                ))}
            </motion.div>
        );

        const AvatarCatalog = ({ db, setDb, playSfx }) => (
            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="grid grid-cols-2 gap-3">
                {AVATARS.map(a => {
                    const isUnlocked = db.unlockedAvatars.includes(a.id);
                    const isEquipped = db.avatar === a.icon;
                    return (
                        <div key={a.id} className={`glass p-4 rounded-2xl flex flex-col items-center text-center transition-all ${isEquipped ? 'border-cyan-500 shadow-[0_0_15px_rgba(0,243,255,0.2)]' : ''}`}>
                            <div className="text-4xl mb-2">{a.icon}</div>
                            <div className="font-o text-[10px] mb-1">{a.name}</div>
                            <div className="text-[8px] text-gray-500 uppercase mb-3">{a.perk}</div>
                            {!isUnlocked ? (
                                <button onClick={() => {
                                    if(db.trophies >= a.cost) {
                                        setDb(p => ({...p, trophies: p.trophies - a.cost, unlockedAvatars: [...p.unlockedAvatars, a.id]}));
                                    } else alert("CREDITS INSUFFISANTS");
                                }} className="w-full py-1 bg-pink-500/20 text-pink-500 text-[9px] font-bold rounded border border-pink-500/50">
                                    BUY {a.cost}
                                </button>
                            ) : (
                                <button onClick={() => setDb(p => ({...p, avatar: a.icon, avatarName: a.name}))} className={`w-full py-1 text-[9px] font-bold rounded ${isEquipped ? 'bg-cyan-500 text-black' : 'bg-white/10 text-white'}`}>
                                    {isEquipped ? 'ACTIVE' : 'EQUIP'}
                                </button>
                            )}
                        </div>
                    );
                })}
            </motion.div>
        );

        const Settings = ({ db, setDb, onDownload }) => (
            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="space-y-4">
                 <div className="text-[10px] font-black text-violet-500 tracking-[0.3em] mb-4 uppercase text-center">// Parametres_Systeme</div>
                 <div className="glass p-6 rounded-3xl space-y-6">
                    <div className="flex justify-between items-center">
                        <span className="font-o text-[10px] tracking-widest">BRUITAGES_SFX</span>
                        <button onClick={() => setDb(p => ({...p, settings: {...p.settings, sfx: !p.settings.sfx}}))} className={`w-12 h-6 rounded-full transition-all flex items-center px-1 ${db.settings.sfx ? 'bg-cyan-500' : 'bg-gray-800'}`}>
                            <div className={`w-4 h-4 bg-white rounded-full transition-all ${db.settings.sfx ? 'translate-x-6' : ''}`}></div>
                        </button>
                    </div>
                    <div className="flex justify-between items-center">
                        <span className="font-o text-[10px] tracking-widest">SYNTH_WAVE_MUSIC</span>
                        <button onClick={() => setDb(p => ({...p, settings: {...p.settings, music: !p.settings.music}}))} className={`w-12 h-6 rounded-full transition-all flex items-center px-1 ${db.settings.music ? 'bg-cyan-500' : 'bg-gray-800'}`}>
                            <div className={`w-4 h-4 bg-white rounded-full transition-all ${db.settings.music ? 'translate-x-6' : ''}`}></div>
                        </button>
                    </div>
                    <div className="pt-6 border-t border-white/5">
                        <button onClick={onDownload} className="w-full py-4 bg-violet-500/20 border border-violet-500/50 text-violet-400 font-o text-[10px] rounded-xl mb-4 hover:bg-violet-500 hover:text-white transition-all">
                            EXPORT_AS_.EXE_WRAPPER
                        </button>
                        <button onClick={() => { if(confirm("RESET TOTAL ?")) { localStorage.clear(); location.reload(); }}} className="w-full text-red-500/50 text-[8px] font-bold tracking-[0.3em] uppercase">
                            [ Formater_Memoire_Centrale ]
                        </button>
                    </div>
                 </div>
                 <div className="p-4 text-center text-gray-600 text-[8px] uppercase tracking-widest">Fitness Quest v15.0.2 - Protocol OMNI active</div>
            </motion.div>
        );

        const Setup = ({ onComplete }) => {
            const [step, setStep] = useState(0);
            const [name, setName] = useState("");
            return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#030308]">
                    <div className="glass p-8 rounded-[40px] w-full max-w-sm border-t-4 border-cyan-500 relative">
                        {step === 0 ? (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}}>
                                <h2 className="font-o text-cyan-400 text-xl mb-2">IDENTIFICATION</h2>
                                <p className="text-[10px] text-gray-500 mb-8 tracking-widest uppercase">Liaison neurale requise</p>
                                <input autoFocus type="text" onChange={(e) => setName(e.target.value)} placeholder="NOM..." className="w-full bg-cyan-500/5 border-b border-cyan-500/30 p-4 font-o text-white mb-10 outline-none uppercase" />
                                <button onClick={() => name && setStep(1)} className="w-full py-5 bg-cyan-500 text-black font-o text-xs cyber-btn">INITIALISER</button>
                            </motion.div>
                        ) : (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}}>
                                <h2 className="font-o text-cyan-400 text-xl mb-6 uppercase">Repos</h2>
                                <div className="grid grid-cols-2 gap-2 mb-10">
                                    {["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"].map(d => (
                                        <button key={d} className="p-3 text-[10px] border border-white/10 rounded-lg font-bold text-gray-500 hover:border-cyan-500 hover:text-cyan-500 uppercase">{d}</button>
                                    ))}
                                </div>
                                <button onClick={() => onComplete({user: name.toUpperCase()})} className="w-full py-5 bg-cyan-500 text-black font-o text-xs cyber-btn">ENTRER_DANS_LE_FLUX</button>
                            </motion.div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
