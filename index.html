<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OMNI V14 - ULTIMATE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM CYBERPUNK --- */
        :root { 
            --cyan: #00f3ff; 
            --pink: #ff0055; 
            --violet: #bc13fe; 
            --dark-bg: #030308;
            --glass: rgba(10, 10, 25, 0.98);
        }

        body { 
            background: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            user-select: none;
        }

        .font-o { font-family: 'Orbitron', sans-serif; }

        /* ANIMATED CYBER GRID BACKGROUND */
        .grid-bg {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; 
            transform: perspective(600px) rotateX(60deg) translateY(-100px);
            animation: grid-scroll 20s linear infinite;
        }

        @keyframes grid-scroll {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        /* UI ELEMENTS */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .cyber-button {
            clip-path: polygon(12% 0, 100% 0, 100% 70%, 88% 100%, 0 100%, 0 30%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-button:active { transform: scale(0.94); filter: brightness(1.3); }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        /* RADIO VISUALIZER */
        .vis-bar { width: 3px; background: var(--cyan); border-radius: 2px; }
        @keyframes bounce { 0%, 100% { height: 4px; } 50% { height: 18px; } }
        .active-vis { animation: bounce 0.6s infinite ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        /**
         * FITNESS QUEST OMNI V14
         * CORE LOGIC : Temps (Difficulté) vs XP (Progression Joueur)
         * RESTRICTIONS : 3 jours repos / 2 sessions max jour
         */

        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- DATA MATRICES ---
        const DAYS_FULL = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
        const AVATAR_LIST = [
            { id: "a1", icon: "🦾", name: "CYBORG", perk: "+5% Force" },
            { id: "a2", icon: "🧬", name: "BIO-HACKER", perk: "+5% Récup" },
            { id: "a3", icon: "⚡", name: "RUNNER", perk: "+5% Agilité" },
            { id: "a4", icon: "🥷", name: "GHOST", perk: "+5% Endurance" }
        ];

        const WORKOUT_DB = {
            PULL: ["Australiennes", "Négatives", "Chin-ups", "Classiques", "Large Grip", "Lestées"],
            PUSH: ["Pompes Genoux", "Inclinaison", "Classiques", "Diamant", "Archer", "Pseudo-Planche"],
            DIPS: ["Dips Chaise", "Dips Banc", "Dips Négatifs", "Dips Barres", "Dips Profonds", "Dips Lestés"],
            LEGS: ["Squat", "Fentes", "Fentes Bulgares", "Side Squat", "Jump Squat", "Pistol Squat"]
        };

        const SHOP_ITEMS = [
            { id: 's1', name: "SÉRUM ALPHA", desc: "+10% XP Permanent", price: 20, type: 'buff' },
            { id: 's2', name: "CORE RECHARGE", desc: "Reset limite session (1x)", price: 45, type: 'action' },
            { id: 's3', name: "INTERFACE VIOLET", desc: "HUD Customization", price: 35, type: 'skin' },
            { id: 's4', name: "PÉPITE FORCE", desc: "+2 Power Levels", price: 15, type: 'stat' }
        ];

        const App = () => {
            // --- STATE INITIALIZATION ---
            const [view, setView] = useState('train');
            const [setupStep, setSetupStep] = useState(0);
            const [tasks, setTasks] = useState({});
            const [radioActive, setRadioActive] = useState(false);
            const audioRef = useRef(null);

            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem('FQ_V14_CORE');
                return saved ? JSON.parse(saved) : {
                    user: null, avatar: "🦾", avatarName: "CYBORG",
                    level: 1, xp: 0, trophies: 0, power: 10,
                    startDate: Date.now(),
                    lastDate: new Date().toDateString(),
                    restDays: [],
                    dailySessions: 0,
                    inventory: [],
                    totalSessions: 0
                };
            });

            // --- PERSISTENCE & TIME RULES ---
            useEffect(() => {
                localStorage.setItem('FQ_V14_CORE', JSON.stringify(db));
                const today = new Date().toDateString();
                
                // Reset quotidien
                if (db.lastDate !== today) {
                    setDb(prev => ({ 
                        ...prev, 
                        lastDate: today, 
                        dailySessions: 0 
                    }));
                }
            }, [db]);

            // --- COMPUTED VALUES ---
            const fitnessLevel = useMemo(() => {
                const diff = Math.floor((Date.now() - db.startDate) / (1000 * 60 * 60 * 24 * 30));
                return Math.min(diff, 5); // Index 0-5 pour les 6 mois
            }, [db.startDate]);

            const isRestDay = useMemo(() => {
                const todayIdx = (new Date().getDay() + 6) % 7;
                return db.restDays.includes(DAYS_FULL[todayIdx]);
            }, [db.restDays]);

            // --- CORE ACTIONS ---
            const handleTask = (id) => setTasks(p => ({ ...p, [id]: !p[id] }));

            const finalizeSession = () => {
                if (db.dailySessions >= 2) return;
                if (Object.keys(tasks).filter(k => tasks[k]).length < 4) return;

                setDb(prev => {
                    let newXp = prev.xp + 35;
                    let newLvl = prev.level;
                    if (newXp >= 100) { newLvl++; newXp = 0; }
                    return {
                        ...prev,
                        xp: newXp,
                        level: newLvl,
                        trophies: prev.trophies + 8,
                        dailySessions: prev.dailySessions + 1,
                        totalSessions: prev.totalSessions + 1
                    };
                });
                setTasks({});
                alert("TRANSMISSION RÉUSSIE. +8 TROPHÉES.");
            };

            const buyItem = (item) => {
                if (db.trophies < item.price) return alert("CRÉDITS INSUFFISANTS");
                setDb(prev => ({
                    ...prev,
                    trophies: prev.trophies - item.price,
                    inventory: [...prev.inventory, item.id],
                    power: item.type === 'stat' ? prev.power + 2 : prev.power
                }));
                alert(`SYNCHRONISATION DE ${item.name} RÉUSSIE.`);
            };

            // --- SETUP FLOW ---
            if (!db.user) return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="glass-panel p-8 rounded-[40px] w-full max-w-sm border-t-4 border-cyan-500 relative overflow-hidden">
                        <div className="scanline"></div>
                        {setupStep === 0 && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}}>
                                <h2 className="font-o text-cyan-400 text-xl mb-2 tracking-tighter">REGISTRE_PILOTE</h2>
                                <p className="text-[10px] text-gray-500 mb-8 uppercase tracking-widest">Entrez votre identifiant de réseau</p>
                                <input id="name-input" type="text" placeholder="NOM..." className="w-full bg-cyan-500/5 border-b border-cyan-500/30 p-4 font-o text-white mb-10 outline-none focus:border-cyan-500 uppercase" />
                                <button onClick={() => {
                                    const val = document.getElementById('name-input').value;
                                    if(val) { setDb(p=>({...p, user: val.toUpperCase()})); setSetupStep(1); }
                                }} className="w-full py-5 bg-cyan-500 text-black font-black font-o text-xs tracking-widest cyber-button">CONTINUER</button>
                            </motion.div>
                        )}
                        {setupStep === 1 && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}}>
                                <h2 className="font-o text-cyan-400 text-xl mb-6 tracking-tighter">CHOIX_AVATAR</h2>
                                <div className="grid grid-cols-2 gap-3 mb-10">
                                    {AVATAR_LIST.map(a => (
                                        <button key={a.id} onClick={() => { setDb(p=>({...p, avatar: a.icon, avatarName: a.name})); setSetupStep(2); }} className="glass-panel p-4 rounded-2xl hover:border-cyan-500 transition-all text-left">
                                            <div className="text-3xl mb-2">{a.icon}</div>
                                            <div className="text-[10px] font-black text-cyan-500 uppercase">{a.name}</div>
                                            <div className="text-[8px] text-gray-500 uppercase">{a.perk}</div>
                                        </button>
                                    ))}
                                </div>
                            </motion.div>
                        )}
                        {setupStep === 2 && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}}>
                                <h2 className="font-o text-cyan-400 text-xl mb-2 tracking-tighter">PROTOCOLE_REPOS</h2>
                                <p className="text-[10px] text-gray-500 mb-6 uppercase tracking-widest">Sélectionnez 3 jours de maintenance</p>
                                <div className="grid grid-cols-2 gap-2 mb-10">
                                    {DAYS_FULL.map(d => (
                                        <button key={d} onClick={() => {
                                            const current = db.restDays;
                                            const next = current.includes(d) ? current.filter(x=>x!==d) : (current.length < 3 ? [...current, d] : current);
                                            setDb(p=>({...p, restDays: next}));
                                        }} className={`p-3 text-[10px] font-bold rounded-lg border transition-all ${db.restDays.includes(d) ? 'bg-cyan-500 border-cyan-500 text-black' : 'border-white/10 text-gray-400'}`}>
                                            {d.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                                <button disabled={db.restDays.length !== 3} onClick={() => location.reload()} className="w-full py-5 bg-cyan-500 text-black font-black font-o text-xs cyber-button disabled:opacity-20">INITIALISER_CORE</button>
                            </motion.div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-4 relative">
                    <audio ref={audioRef} loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" />

                    {/* HEADER STATUS */}
                    <header className="glass-panel p-4 rounded-3xl mb-4 border-l-4 border-cyan-500 flex justify-between items-center">
                        <div className="flex gap-4 items-center">
                            <div className="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl border border-white/10">
                                {db.avatar}
                            </div>
                            <div>
                                <h2 className="font-o text-lg tracking-tighter leading-none">{db.user}</h2>
                                <p className="text-[8px] font-black text-cyan-500 tracking-[0.3em] mt-1">{db.avatarName}_UNIT</p>
                                <div className="flex gap-2 mt-2">
                                    <span className="text-[8px] bg-cyan-500/10 px-2 py-0.5 rounded text-cyan-400 font-bold uppercase">LVL {db.level}</span>
                                    <span className="text-[8px] bg-violet-500/10 px-2 py-0.5 rounded text-violet-400 font-bold uppercase">PWR {db.power}</span>
                                </div>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-o text-2xl tracking-tighter">{db.trophies}🏆</div>
                            <div className="text-[8px] text-gray-500 font-black tracking-widest">CRÉDITS_RÉSEAU</div>
                        </div>
                    </header>

                    {/* CYBER RADIO */}
                    <div className="glass-panel px-5 py-3 rounded-2xl mb-4 flex items-center justify-between border-violet-500/20">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { radioActive ? audioRef.current.pause() : audioRef.current.play(); setRadioActive(!radioActive); }} className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-cyan-500 border border-cyan-500/20">
                                {radioActive ? 'Ⅱ' : '▶'}
                            </button>
                            <div>
                                <p className="text-[9px] font-o text-violet-400 tracking-widest">NEON_FREQUENCY_FM</p>
                                <p className="text-[7px] text-gray-600 uppercase">Stream : Synthwave_Radio_Alpha</p>
                            </div>
                        </div>
                        <div className="flex gap-1 items-end h-4">
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className={`vis-bar ${radioActive ? 'active-vis' : ''}`} style={{animationDelay: `${i*0.1}s`}} />
                            ))}
                        </div>
                    </div>

                    {/* XP PROGRESS */}
                    <div className="px-2 mb-6">
                        <div className="flex justify-between text-[8px] font-black mb-1 text-gray-500 uppercase tracking-widest">
                            <span>Surcharge_Niveau</span>
                            <span>{db.xp}%</span>
                        </div>
                        <div className="h-1 w-full bg-white/5 rounded-full overflow-hidden p-[1px]">
                            <motion.div animate={{width: `${db.xp}%`}} className="h-full bg-gradient-to-r from-cyan-600 to-cyan-400 shadow-[0_0_10px_#00f3ff]" />
                        </div>
                    </div>

                    {/* MAIN HUD CONTENT */}
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        <AnimatePresence mode="wait">
                            {view === 'train' && (
                                <motion.div key="t" initial={{opacity:0, x:-10}} animate={{opacity:1, x:0}} exit={{opacity:0, x:10}}>
                                    {db.dailySessions >= 2 ? (
                                        <div className="glass-panel p-12 rounded-[40px] text-center border-red-500/30">
                                            <div className="text-6xl mb-6 grayscale opacity-50">🚫</div>
                                            <h3 className="font-o text-red-500 text-lg mb-2">ACCÈS_REFUSÉ</h3>
                                            <p className="text-xs text-gray-500 leading-relaxed uppercase tracking-tighter">Limite de sécurité atteinte (2/2). Revenez après le prochain cycle de 24h.</p>
                                        </div>
                                    ) : isRestDay ? (
                                        <div className="glass-panel p-12 rounded-[40px] text-center border-violet-500/30">
                                            <div className="text-6xl mb-6">🔋</div>
                                            <h3 className="font-o text-violet-400 text-lg mb-2">MAINTENANCE_EN_COURS</h3>
                                            <p className="text-xs text-gray-500 leading-relaxed uppercase tracking-tighter">Jour de repos détecté. Ton système nerveux se recalibre. Profite du calme.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center mb-4 px-1">
                                                <h3 className="text-[10px] font-black text-cyan-500 tracking-[0.3em] uppercase underline underline-offset-8">Missions_Physiques_M{fitnessLevel+1}</h3>
                                                <span className={`text-[9px] font-o ${db.dailySessions === 1 ? 'text-orange-500' : 'text-gray-500'}`}>SESSION_{db.dailySessions+1}/2</span>
                                            </div>
                                            {Object.entries(WORKOUT_DB).map(([cat, list], i) => (
                                                <div key={cat} onClick={() => handleTask(cat)} className={`glass-panel p-5 rounded-2xl flex justify-between items-center transition-all ${tasks[cat] ? 'bg-cyan-500/10 border-cyan-500/40' : 'opacity-60 border-white/5'}`}>
                                                    <div>
                                                        <div className="text-[7px] font-black text-violet-500 uppercase mb-1">{cat}_MODULE</div>
                                                        <div className="font-o text-sm tracking-tight text-white">{list[fitnessLevel]}</div>
                                                        <div className="text-[9px] text-gray-500 mt-1 uppercase">Objectif : <span className="text-white">{cat === 'LEGS' ? 25 : 12} Reps</span></div>
                                                    </div>
                                                    <div className={`w-8 h-8 rounded-lg border flex items-center justify-center transition-all ${tasks[cat] ? 'bg-cyan-500 border-white text-black font-black' : 'border-white/10'}`}>
                                                        {tasks[cat] && '✓'}
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={finalizeSession} className={`w-full py-6 mt-4 cyber-button font-black tracking-[0.5em] text-[10px] ${Object.keys(tasks).length >= 4 ? 'bg-white text-black' : 'bg-white/5 text-gray-700 pointer-events-none'}`}>
                                                TRANSFÉRER_DONNÉES_SÉANCE
                                            </button>
                                        </div>
                                    )}
                                </motion.div>
                            )}

                            {view === 'shop' && (
                                <motion.div key="s" initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} className="grid grid-cols-2 gap-3">
                                    <div className="col-span-2 text-[10px] font-black text-pink-500 tracking-[0.3em] uppercase mb-2 px-1">// MARCHÉ_NOIR_SYSTEM</div>
                                    {SHOP_ITEMS.map(item => (
                                        <div key={item.id} className="glass-panel p-4 rounded-2xl border-pink-500/20 flex flex-col justify-between h-44">
                                            <div>
                                                <div className="text-[7px] text-pink-500 font-black uppercase mb-1">{item.type}</div>
                                                <h4 className="font-o text-[10px] text-white leading-tight mb-2">{item.name}</h4>
                                                <p className="text-[9px] text-gray-500 leading-tight font-bold uppercase">{item.desc}</p>
                                            </div>
                                            <button onClick={() => buyItem(item)} className="w-full py-2 bg-pink-500/10 border border-pink-500/50 text-pink-500 text-[9px] font-o rounded-lg hover:bg-pink-500 hover:text-white transition-all">
                                                {item.price} 🏆
                                            </button>
                                        </div>
                                    ))}
                                </motion.div>
                            )}

                            {view === 'stats' && (
                                <motion.div key="st" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="space-y-4">
                                    <div className="glass-panel p-8 rounded-[40px] text-center border-b-2 border-cyan-500">
                                        <div className="w-20 h-20 mx-auto mb-6 bg-white/5 rounded-3xl flex items-center justify-center text-4xl border border-white/10">
                                            {db.avatar}
                                        </div>
                                        <h3 className="font-o text-2xl mb-1">{db.user}</h3>
                                        <p className="text-[10px] text-cyan-500 font-black tracking-widest uppercase mb-8">Niveau_D'accès_Global</p>
                                        
                                        <div className="grid grid-cols-2 gap-4 text-left">
                                            <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                                <div className="text-[7px] text-gray-500 uppercase font-bold mb-1">Sessions_Total</div>
                                                <div className="font-o text-lg">{db.totalSessions}</div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                                <div className="text-[7px] text-gray-500 uppercase font-bold mb-1">Jours_Repos</div>
                                                <div className="font-o text-[9px] mt-1">{db.restDays.join(', ')}</div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                                <div className="text-[7px] text-gray-500 uppercase font-bold mb-1">Mois_Service</div>
                                                <div className="font-o text-lg">0{fitnessLevel+1}</div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                                <div className="text-[7px] text-gray-500 uppercase font-bold mb-1">Power_Index</div>
                                                <div className="font-o text-lg text-violet-400">{db.power}</div>
                                            </div>
                                        </div>

                                        <button onClick={() => { if(confirm("FORMATEZ TOUTES LES DONNÉES ?")) { localStorage.clear(); location.reload(); }}} className="mt-12 text-red-500/30 text-[8px] font-black tracking-[0.4em] hover:text-red-500 transition-colors uppercase">
                                            [ RÉINITIALISER_SYSTÈME_CENTRAL ]
                                        </button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* DOCK NAV */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass-panel rounded-full p-2 flex gap-1 z-50 shadow-[0_10px_50px_rgba(0,0,0,0.9)] border-t border-white/10">
                        {['train', 'shop', 'stats'].map(m => (
                            <button key={m} onClick={() => setView(m)} className={`flex-1 py-3 rounded-full font-o text-[9px] tracking-widest transition-all ${view === m ? 'bg-cyan-500 text-black shadow-[0_0_20px_rgba(0,243,255,0.4)]' : 'text-gray-500 hover:text-white'}`}>
                                {m.toUpperCase()}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
