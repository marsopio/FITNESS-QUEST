<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OVERDRIVE</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f3ff; --pink: #ff0055; --violet: #bc13fe; --dark: #050508;
            --neon-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }
        body { background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(10px); border: 1px solid var(--cyan); box-shadow: var(--neon-shadow); }
        .cyber-btn { clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); transition: 0.2s; font-weight: 900; }
        .cyber-btn:active { transform: scale(0.95); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--violet)); box-shadow: 0 0 15px var(--cyan); transition: width 1s ease; }
        
        /* Animation Avatar */
        .avatar-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const RANK_NAMES = ["NOBODY", "DUST", "GLITCH", "SCRAP", "WANDERER", "NOMAD", "RUNNER", "HACKER", "PHANTOM", "TITAN", "ULTRAMAN"]; // Liste courte pour l'exemple

        // --- COMPOSANT AVATAR STYLE ---
        const CyberAvatar = () => (
            <div className="w-32 h-32 mx-auto relative avatar-float">
                <svg viewBox="0 0 100 100" className="w-full h-full">
                    {/* Visage / Casque */}
                    <path d="M25 40 Q25 20 50 20 Q75 20 75 40 L75 70 Q75 85 50 85 Q25 85 25 70 Z" fill="#1a1a2e" stroke="#bc13fe" strokeWidth="2" />
                    {/* Lunettes de soleil Cyber */}
                    <rect x="25" y="40" width="50" height="12" fill="#00f3ff" className="opacity-80" />
                    <rect x="25" y="40" width="50" height="2" fill="white" />
                    {/* Éclats Néon */}
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#00f3ff" strokeWidth="0.5" strokeDasharray="5,5" />
                </svg>
            </div>
        );

        const App = () => {
            const [tab, setTab] = useState('train');
            const [completed, setCompleted] = useState({});
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('FQ_V3_FINAL');
                return saved ? JSON.parse(saved) : { user: null, trophies: 0, xp: 0, level: 1, streak: 0, dailyWorkouts: 0, lastDate: null };
            });

            useEffect(() => {
                localStorage.setItem('FQ_V3_FINAL', JSON.stringify(state));
                const today = new Date().toDateString();
                if (state.lastDate !== today) {
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                    const newStreak = (state.lastDate === yesterday.toDateString()) ? state.streak : 0;
                    setState(s => ({ ...s, dailyWorkouts: 0, streak: newStreak, lastDate: today }));
                }
            }, [state]);

            const handleFinalize = () => {
                const reward = state.dailyWorkouts === 0 ? 15 : 10;
                setState(s => ({
                    ...s,
                    trophies: s.trophies + reward,
                    dailyWorkouts: s.dailyWorkouts + 1,
                    streak: s.dailyWorkouts === 0 ? s.streak + 1 : s.streak
                }));
                setCompleted({});
            };

            if (!state.user) return (
                <div className="h-screen flex items-center justify-center p-8 bg-black">
                    <div className="glass-card p-8 rounded-3xl w-full max-w-sm text-center">
                        <h1 className="font-orbitron text-2xl font-black text-cyan-400 mb-6">NEW PILOT DETECTED</h1>
                        <input id="un" type="text" placeholder="ID" className="w-full bg-transparent border-b-2 border-cyan-500 p-2 text-center mb-8 outline-none font-orbitron" />
                        <button onClick={() => {const v = document.getElementById('un').value; if(v) setState(s=>({...s, user:v.toUpperCase()}))}} className="cyber-btn bg-cyan-500 text-black w-full py-4">ACTIVER</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-6">
                    <header className="flex justify-between items-center mb-6 glass-card p-4 rounded-2xl">
                        <div>
                            <div className="text-[10px] text-violet-500 font-bold tracking-widest">{RANK_NAMES[state.level-1] || "ELITE"}</div>
                            <div className="font-orbitron text-lg">{state.user}</div>
                        </div>
                        <div className="text-right">
                            <div className="font-orbitron text-xl text-cyan-400">{state.trophies}🏆</div>
                            <div className="text-[10px] opacity-50 uppercase">Lvl {state.level}</div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto pb-24">
                        {tab === 'train' ? (
                            <div className="space-y-4">
                                {state.dailyWorkouts >= 2 ? (
                                    <div className="glass-card py-20 rounded-3xl text-center border-pink-500 shadow-pink-500/20">
                                        <p className="font-orbitron text-pink-500">SYSTEM RECHARGING</p>
                                    </div>
                                ) : (
                                    <>
                                        {[1,2,3,4].map(i => (
                                            <div key={i} onClick={() => setCompleted(c => ({...c, [i]: !c[i]}))} className={`p-5 rounded-xl border-2 transition-all flex justify-between items-center ${completed[i] ? 'border-white bg-white/10' : 'border-cyan-500/50 bg-cyan-500/5'}`}>
                                                <span className="font-orbitron text-sm">TASK_0{i}</span>
                                                <div className={`w-4 h-4 border ${completed[i] ? 'bg-cyan-400' : 'border-cyan-500'}`}></div>
                                            </div>
                                        ))}
                                        <button onClick={handleFinalize} className={`w-full py-5 cyber-btn ${Object.keys(completed).length === 4 ? 'bg-white text-black' : 'bg-white/10 text-white/20'}`}>VALIDER SESSION</button>
                                    </>
                                )}
                            </div>
                        ) : (
                            <div className="text-center">
                                <CyberAvatar />
                                <h3 className="font-orbitron text-xl mt-4 text-cyan-400">{state.user}</h3>
                                <div className="grid grid-cols-2 gap-4 mt-8">
                                    <div className="glass-card p-4 rounded-xl">
                                        <div className="text-[10px] opacity-50 uppercase">Série</div>
                                        <div className="text-2xl font-orbitron">{state.streak}j</div>
                                    </div>
                                    <div className="glass-card p-4 rounded-xl">
                                        <div className="text-[10px] opacity-50 uppercase">Quota</div>
                                        <div className="text-2xl font-orbitron">{state.dailyWorkouts}/2</div>
                                    </div>
                                </div>
                                {/* Bouton Boutique Construction */}
                                <button onClick={() => alert("TERMINAL EN CONSTRUCTION...\nBientôt disponible pour votre unité.")} className="w-full mt-10 p-4 border border-violet-500 text-violet-500 font-orbitron text-xs rounded-xl flex items-center justify-center gap-3 opacity-80 hover:opacity-100">
                                    <span>🛒</span> SHOP (CONSTRUCTION)
                                </button>
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-2xl flex items-center justify-around z-50">
                        <button onClick={() => setTab('train')} className={`flex flex-col items-center ${tab === 'train' ? 'text-cyan-400 scale-110' : 'opacity-30'}`}>
                            <span className="text-2xl">⚡</span>
                            <span className="text-[9px] font-black mt-1">MISSION</span>
                        </button>
                        <button onClick={() => setTab('profile')} className={`flex flex-col items-center ${tab === 'profile' ? 'text-violet-400 scale-110' : 'opacity-30'}`}>
                            <span className="text-2xl">👤</span>
                            <span className="text-[9px] font-black mt-1">CORE</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
