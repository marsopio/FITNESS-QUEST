<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OMNI V18</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --cyan: #00f3ff; --pink: #ff0055; --dark: #030308; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .font-o { font-family: 'Orbitron', sans-serif; }
        .grid-bg { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(0,243,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,243,255,0.05) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px); animation: grid-scroll 15s linear infinite; }
        @keyframes grid-scroll { from { background-position: 0 0; } to { background-position: 0 40px; } }
        .glass { background: rgba(10, 10, 25, 0.96); backdrop-filter: blur(20px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .cyber-btn { clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const RANKS = [
    // 0 - 9 : Les Inconnus
    "NOBODY", "GHOST", "OUTSIDER", "CITIZEN", "BYSTANDER", "NEWBIE", "AMATEUR", "ROOKIE", "TRAINEE", "ASPIRANT",
    
    // 10 - 19 : Le Réveil
    "RECRUIT", "INITIATE", "MEMBER", "SCOUT", "RUNNER", "STRIKER", "SOLDIER", "GRUNT", "MILITANT", "OPERATIVE",
    
    // 20 - 29 : La Force
    "WARRIOR", "FIGHTER", "BRAWLER", "CHALLENGER", "CONTENDER", "ATHLETE", "PROSPECT", "TALENT", "ELITE", "VETERAN",
    
    // 30 - 39 : Les Cyber-Augmentés
    "CYBER_UNIT", "TECH_FIGHTER", "NEON_STRIDER", "CORE_PILOT", "LINK_USER", "DATA_WARRIOR", "GRID_RUNNER", "SYSTEM_SCOUT", "CODE_BREAKER", "BIT_CRUSHER",
    
    // 40 - 49 : Les Commandants
    "COMMANDO", "OFFICER", "CAPTAIN", "MAJOR", "COLONEL", "GENERAL", "MARSHAL", "CHIEF", "DIRECTOR", "OVERSEER",
    
    // 50 - 59 : L'Elite Omni
    "ELITE_UNIT", "ALPHA_ONE", "PRIME_SOLDIER", "OMEGA_STRIKER", "TITAN", "COLOSSUS", "GOLIATH", "VANGUARD", "SENTINEL", "GUARDIAN",
    
    // 60 - 69 : Les Maîtres du Flux
    "MASTER", "SENSEI", "SHIHAN", "GRANDMASTER", "SAGE", "PROPHET", "ORACLE", "ARCHITECT", "DESIGNER", "ENGINEER",
    
    // 70 - 79 : Les Seigneurs de l'Acier
    "CYBER_LORD", "NEON_KING", "GRID_MASTER", "SILICON_DUKE", "CHIP_BARON", "DATA_PRINCE", "VOXEL_EMPEROR", "VOID_WALKER", "RIFT_JUMPER", "STAR_GAZER",
    
    // 80 - 89 : Les Transcendants
    "TRANSCENDANT", "ASCENDED", "EVOLVED", "SUPERIOR", "SUPREME", "ULTIMATE", "ABSOLUTE", "ETERNAL", "IMMORTAL", "DEMI_GOD",
    
    // 90 - 99 : Le Sommet
    "GOD_MODE", "CELESTIAL", "GALACTIC", "UNIVERSAL", "MULTIVERSAL", "REALITY_SHAPER", "OMNI_ARCHITECT", "ZENITH", "APEX", "ULTRAMAN"
];
        const EXOS = {
            PUSH: ["Pompes Inclinées", "Pompes Classiques", "Pompes Diamant", "Pompes Archer"],
            PULL: ["Australiennes", "Négatives", "Pull-ups", "Lestées"],
            LEGS: ["Squats", "Fentes", "Side Squats", "Pistols"]
        };

        const App = () => {
            const audioRef = useRef(null);
            const [loading, setLoading] = useState(true);
            const [setup, setSetup] = useState(false);
            const [view, setView] = useState('train');
            const [tasks, setTasks] = useState({});
            const [isRadioPlaying, setIsRadioPlaying] = useState(false);
            const [progress, setProgress] = useState(0);

            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem('FQ_V18_FINAL');
                return saved ? JSON.parse(saved) : null;
            });

            // ÉCRAN DE CHARGEMENT
            useEffect(() => {
                const timer = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 100) {
                            clearInterval(timer);
                            setTimeout(() => {
                                setLoading(false);
                                if (!db) setSetup(true);
                            }, 500);
                            return 100;
                        }
                        return prev + 2;
                    });
                }, 30);
                return () => clearInterval(timer);
            }, [db]);

            useEffect(() => { 
                if (db) localStorage.setItem('FQ_V18_FINAL', JSON.stringify(db)); 
            }, [db]);

            const xpNeeded = db ? (50 + Math.floor(db.trophies / 2)) : 50;
            const currentRank = db ? RANKS[Math.min(Math.floor(db.level / 20), 5)] : "UNKNOWN";

            const playClick = () => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.frequency.value = 600; g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
                o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1);
            };

            const handleFinishSetup = (name) => {
                const newDb = {
                    user: name.toUpperCase(), avatar: "🦾", level: 1, xp: 0, trophies: 10,
                    dailySessions: 0, totalSessions: 0, lastDate: new Date().toDateString()
                };
                setDb(newDb);
                setSetup(false);
            };

            const completeWorkout = () => {
                if (db.dailySessions >= 2) return alert("SYSTÈME EN RECHARGE : REPOS REQUIS (24H)");
                if (Object.keys(tasks).length < 3) return alert("MISSIONS INCOMPLÈTES");

                playClick();
                let gainXP = 20 + Math.floor(db.trophies / 200);
                let newXP = db.xp + gainXP;
                let newLvl = db.level;

                if (newXP >= xpNeeded) {
                    newLvl++; newXP -= xpNeeded;
                    alert(`UPGRADE DÉTECTÉE : GRADE ${RANKS[Math.min(Math.floor(newLvl / 20), 5)]}`);
                }

                setDb(prev => ({
                    ...prev, xp: newXP, level: newLvl,
                    trophies: prev.trophies + 15,
                    dailySessions: prev.dailySessions + 1,
                    totalSessions: prev.totalSessions + 1
                }));
                setTasks({});
            };

            // ÉCRAN DE CHARGEMENT VISUEL
            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center p-10 bg-[#030308]">
                    <h1 className="font-o text-cyan-400 text-xl tracking-[0.5em] mb-10">INITIALISATION...</h1>
                    <div className="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                        <motion.div className="h-full bg-cyan-500" initial={{width:0}} animate={{width: `${progress}%`}} />
                    </div>
                    <p className="font-o text-[8px] text-gray-600 mt-4 tracking-widest uppercase">Chargement des modules de Calisthénie v18.0.4</p>
                </div>
            );

            // CRÉATEUR DE PSEUDO
            if (setup) return (
                <div className="h-screen flex flex-col items-center justify-center p-8">
                    <div className="glass p-8 rounded-[2rem] w-full text-center border-cyan-500/30">
                        <h2 className="font-o text-cyan-500 mb-6 tracking-widest text-sm">ENREGISTREMENT PILOTE</h2>
                        <input id="nameInput" type="text" placeholder="ENTREZ VOTRE NOM" className="bg-transparent border-b border-white/20 text-center font-o text-xl w-full outline-none py-2 mb-8 focus:border-cyan-500 transition-colors" />
                        <button onClick={() => handleFinishSetup(document.getElementById('nameInput').value)} className="w-full py-4 bg-white text-black font-o text-xs tracking-[0.3em] cyber-btn">ACTIVER LE PROFIL</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-4 relative">
                    <audio ref={audioRef} loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" />

                    <header className="glass p-4 rounded-3xl mb-4 flex justify-between items-center border-l-4 border-cyan-500">
                        <div className="flex gap-3 items-center">
                            <div className="text-3xl bg-white/5 w-12 h-12 flex items-center justify-center rounded-xl border border-white/10">{db.avatar}</div>
                            <div>
                                <h2 className="font-o text-[9px] text-cyan-400 tracking-tighter">{currentRank}</h2>
                                <h2 className="font-o text-sm tracking-tighter leading-none">{db.user}</h2>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-o text-xl text-yellow-400 leading-none">{db.trophies}🏆</div>
                            <div className="text-[7px] text-gray-500 font-bold uppercase mt-1">Crédits</div>
                        </div>
                    </header>

                    <div className="glass px-4 py-2 rounded-2xl mb-4 flex items-center justify-between border-violet-500/20">
                        <button onClick={() => { isRadioPlaying ? audioRef.current.pause() : audioRef.current.play(); setIsRadioPlaying(!isRadioPlaying); }} className={`w-8 h-8 rounded-full border ${isRadioPlaying ? 'border-cyan-500 text-cyan-500 shadow-[0_0_10px_#00f3ff]' : 'border-white/10 text-gray-600'}`}>
                            {isRadioPlaying ? 'Ⅱ' : '▶'}
                        </button>
                        <div className="flex gap-1 items-end h-3">
                            {[1,2,3,4,5].map(i => <div key={i} className={`w-[2px] bg-cyan-500 ${isRadioPlaying ? 'animate-bounce' : 'h-[2px]'}`} style={{animationDuration: '0.6s', animationDelay: i*0.1+'s'}} />)}
                        </div>
                    </div>

                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {view === 'train' && (
                            <div className="space-y-3">
                                <div className="flex justify-between items-center px-1">
                                    <h3 className="text-[10px] font-black text-cyan-500 tracking-widest uppercase italic font-o">Missions_Du_Jour</h3>
                                    <span className="text-[9px] text-gray-500 font-bold">{db.dailySessions}/2</span>
                                </div>
                                {Object.entries(EXOS).map(([key, list]) => (
                                    <div key={key} onClick={() => { playClick(); toggleTask(key); }} className={`glass p-5 rounded-2xl flex justify-between items-center transition-all ${tasks[key] ? 'border-cyan-500/50 bg-cyan-500/5 shadow-[inset_0_0_20px_rgba(0,243,255,0.05)]' : 'opacity-60'}`} onClick={() => {playClick(); setTasks(p=>({...p, [key]:!p[key]}))}}>
                                        <div>
                                            <div className="text-[7px] text-violet-500 font-bold uppercase tracking-widest">{key}_MODULE</div>
                                            <div className="font-o text-sm text-white">{list[Math.min(Math.floor(db.level/25), 3)]}</div>
                                        </div>
                                        <div className={`w-6 h-6 rounded border flex items-center justify-center text-[10px] ${tasks[key] ? 'bg-cyan-500 text-black' : 'border-white/10'}`}>{tasks[key] ? '✓' : ''}</div>
                                    </div>
                                ))}
                                <button onClick={completeWorkout} className="w-full py-5 mt-4 bg-white text-black font-o text-[10px] tracking-[0.4em] cyber-btn">SYNCHRONISER LA SESSION</button>
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="space-y-4">
                                <div className="glass p-8 rounded-[2.5rem] text-center border-cyan-500/20">
                                    <div className="text-6xl mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">{db.avatar}</div>
                                    <h3 className="font-o text-2xl tracking-tighter text-white mb-1">{db.user}</h3>
                                    <p className="text-cyan-500 font-o text-[10px] tracking-[0.3em] uppercase mb-8">{currentRank} // LVL {db.level}</p>
                                    
                                    <div className="text-left mb-6">
                                        <div className="flex justify-between text-[8px] font-bold text-gray-500 uppercase tracking-widest mb-1">
                                            <span>XP_PROG_SYSTEM</span>
                                            <span>{db.xp} / {xpNeeded}</span>
                                        </div>
                                        <div className="h-1.5 bg-white/5 rounded-full overflow-hidden p-[1px]">
                                            <div className="h-full bg-cyan-500" style={{width: `${(db.xp/xpNeeded)*100}%`}}></div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-4 rounded-2xl text-left border border-white/5">
                                            <div className="text-[7px] text-gray-500 uppercase font-bold">Total_Workouts</div>
                                            <div className="font-o text-xl text-white">{db.totalSessions}</div>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-2xl text-left border border-white/5">
                                            <div className="text-[7px] text-gray-500 uppercase font-bold">Calis_Progress</div>
                                            <div className="font-o text-xl text-violet-400">{Math.min(100, Math.floor((db.trophies/20000)*100))}%</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { if(confirm("FORMATEUR LE SYSTÈME ?")) {localStorage.clear(); location.reload();}}} className="w-full text-[8px] text-red-500/20 font-black tracking-widest py-4 uppercase">[ RÉINITIALISATION_DU_NOYAU ]</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full p-1.5 flex gap-1 z-50">
                        {['train', 'stats'].map(m => (
                            <button key={m} onClick={() => setView(m)} className={`flex-1 py-3 rounded-full font-o text-[9px] tracking-widest transition-all ${view === m ? 'bg-cyan-500 text-black shadow-[0_0_15px_rgba(0,243,255,0.5)]' : 'text-gray-500'}`}>
                                {m.toUpperCase()}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
