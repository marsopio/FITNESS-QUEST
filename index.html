<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS QUEST - OVERDRIVE</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f3ff; --pink: #ff0055; --green: #39ff14; --dark: #060608;
            --glass: rgba(10, 10, 20, 0.85);
        }
        
        body { 
            background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--dark) 100%);
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Grille animée 3D */
        .cyber-grid { 
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--cyan) 1px, transparent 1px), 
                linear-gradient(90deg, var(--cyan) 1px, transparent 1px);
            background-size: 45px 45px;
            opacity: 0.05;
            transform: perspective(1000px) rotateX(60deg) translateY(-100px);
            animation: grid-scroll 30s linear infinite;
        }
        @keyframes grid-scroll { from { background-position: 0 0; } to { background-position: 0 45px; } }

        /* Scanline & Glitch */
        .scanline {
            width: 100%; height: 4px; background: rgba(0, 243, 255, 0.1);
            position: fixed; top: 0; left: 0; z-index: 100; pointer-events: none;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* Classes Utilitaires Cyber */
        .glass-panel { 
            background: var(--glass); backdrop-filter: blur(15px); 
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .cyber-btn {
            position: relative; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; font-weight: 900;
        }
        .cyber-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        .progress-container { height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
        .progress-value { height: 100%; transition: width 1.5s cubic-bezier(0.1, 0, 0, 1); }

        /* Personnage CSS */
        .avatar-core {
            filter: drop-shadow(0 0 15px var(--glow));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const TITLES = ["NEOPHYTE", "USER", "RUNNER", "HACKER", "GLITCH", "OPERATOR", "AGENT", "ENFORCER", "ELITE", "SPECTRE", "GHOST", "CHRONOS", "VECTOR", "NEXUS", "CYBER-LORD", "OVERDRIVE"];

        // --- COMPOSANT AVATAR ---
        const EvolutionAvatar = ({ level, isCali }) => {
            const glowColor = isCali ? "#39ff14" : (level >= 50 ? "#ff0055" : "#00f3ff");
            return (
                <div className="relative w-48 h-48 mx-auto flex items-center justify-center avatar-core" style={{"--glow": glowColor}}>
                    {/* Anneaux extérieurs */}
                    <motion.div animate={{ rotate: 360 }} transition={{ duration: 10, repeat: Infinity, ease: "linear" }}
                        className="absolute w-full h-full border-2 border-dashed rounded-full" style={{ borderColor: glowColor, opacity: 0.3 }} />
                    <motion.div animate={{ rotate: -360 }} transition={{ duration: 15, repeat: Infinity, ease: "linear" }}
                        className="absolute w-4/5 h-4/5 border border-double rounded-full" style={{ borderColor: glowColor, opacity: 0.5 }} />
                    
                    {/* Noyau Central */}
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <div className="absolute inset-0 rounded-lg rotate-45 border-4" style={{ borderColor: glowColor }}></div>
                        <div className="absolute inset-2 bg-white/10 backdrop-blur-md rounded-sm"></div>
                        <span className="font-orbitron text-2xl font-black" style={{ color: glowColor }}>
                            {level}
                        </span>
                    </div>

                    {/* Éléments additionnels selon niveau */}
                    {level > 10 && <div className="absolute -top-2 w-1 h-8" style={{ backgroundColor: glowColor }}></div>}
                    {level > 30 && <div className="absolute -bottom-2 w-1 h-8" style={{ backgroundColor: glowColor }}></div>}
                    {isCali && (
                        <div className="absolute inset-0 animate-pulse border-4 rounded-full" style={{ borderColor: glowColor, opacity: 0.2 }}></div>
                    )}
                </div>
            );
        };

        // --- COMPOSANT PRINCIPAL ---
        const App = () => {
            const [tab, setTab] = useState('train');
            const [completed, setCompleted] = useState({});
            const [sideQuest, setSideQuest] = useState(null);
            const [isInitialLoad, setIsInitialLoad] = useState(true);
            const audioRef = useRef(new Audio('music.mp3'));
            const [isPlaying, setIsPlaying] = useState(false);

            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('FQ_OVERDRIVE_V2');
                return saved ? JSON.parse(saved) : {
                    user: null, trophies: 0, xp: 0, level: 1, streak: 0, 
                    dailyWorkouts: 0, lastDate: null, totalSessions: 0
                };
            });

            // Sauvegarde & Sync Date
            useEffect(() => {
                localStorage.setItem('FQ_OVERDRIVE_V2', JSON.stringify(state));
                const today = new Date().toDateString();
                if (state.lastDate !== today) {
                    setState(s => ({ ...s, dailyWorkouts: 0, lastDate: today }));
                }
                if (isInitialLoad) {
                    setTimeout(() => { setIsInitialLoad(false); generateQuest(); }, 2000);
                }
            }, [state]);

            const isCali = state.trophies >= 2000;
            const reqXP = state.level * 40; 
            const title = TITLES[Math.floor(state.level / 7)] || "ULTRAMAN";

            const toggleMusic = () => {
                if(isPlaying) audioRef.current.pause();
                else { audioRef.current.loop = true; audioRef.current.play().catch(() => {}); }
                setIsPlaying(!isPlaying);
            };

            const generateQuest = () => {
                const pool = [
                    { id: 'q1', n: "Flux Cardio", ex: "Mountain Climbers", r: 30 + state.level },
                    { id: 'q2', n: "Neural Core", ex: "Leg Raises", r: 20 + state.level },
                    { id: 'q3', n: "Static Lock", ex: "Gainage (sec)", r: 40 + state.level }
                ];
                setSideQuest(pool[Math.floor(Math.random() * pool.length)]);
            };

            const handleXP = (amount) => {
                setState(s => {
                    let newXP = s.xp + amount;
                    let newLvl = s.level;
                    let currentReq = newLvl * 40;
                    while (newXP >= currentReq && newLvl < 100) {
                        newXP -= currentReq;
                        newLvl++;
                        currentReq = newLvl * 40;
                        alert(`SYSTEM UPGRADE: NIVEAU ${newLvl} DÉVERROUILLÉ`);
                    }
                    return { ...s, xp: newXP, level: newLvl };
                });
            };

            const finalizeSession = () => {
                if (Object.keys(completed).length < 4) return;
                const reward = state.dailyWorkouts === 0 ? 15 : 10;
                setState(s => ({
                    ...s, 
                    trophies: s.trophies + reward,
                    dailyWorkouts: s.dailyWorkouts + 1,
                    totalSessions: s.totalSessions + 1,
                    streak: s.streak + 1
                }));
                setCompleted({});
            };

            const exercises = useMemo(() => {
                const base = Math.floor(state.trophies / 60);
                if (isCali) return [
                    { id: 1, n: "Type-I: Muscle Up", r: 5 + Math.floor(base/4), i: "⚡", c: "var(--green)" },
                    { id: 2, n: "Type-II: Archer Pushups", r: 12 + base, i: "🏹", c: "var(--green)" },
                    { id: 3, n: "Type-III: Front Lever Iso", r: 15 + base, i: "⚓", c: "var(--green)" },
                    { id: 4, n: "Type-IV: Pistol Squats", r: 10 + Math.floor(base/2), i: "🎯", c: "var(--green)" }
                ];
                return [
                    { id: 1, n: "Protocol: Pompes", r: 15 + base, i: "🦾", c: "var(--cyan)" },
                    { id: 2, n: "Protocol: Tractions", r: 8 + Math.floor(base/2), i: "⚔️", c: "var(--pink)" },
                    { id: 3, n: "Protocol: Dips", r: 12 + base, i: "⚖️", c: "#a855f7" },
                    { id: 4, n: "Protocol: Squats", r: 20 + base, i: "🦵", c: "var(--green)" }
                ];
            }, [state.trophies, isCali]);

            if (isInitialLoad) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black">
                    <motion.div animate={{ opacity: [0, 1, 0] }} transition={{ duration: 2, repeat: Infinity }}
                        className="font-orbitron text-2xl tracking-[1em] text-cyan-400">BOOTING_CORE...</motion.div>
                </div>
            );

            if (!state.user) return (
                <div className="h-screen flex items-center justify-center p-8">
                    <div className="glass-panel p-10 rounded-3xl w-full max-w-sm text-center">
                        <h1 className="font-orbitron text-4xl font-black mb-2">IDENTIFICATION</h1>
                        <p className="text-cyan-500 text-xs tracking-widest mb-10 uppercase">Nouvelle Unité Détectée</p>
                        <input id="userName" type="text" placeholder="ENTREZ ID" className="w-full bg-white/5 border-b-2 border-cyan-500 p-4 font-orbitron text-white outline-none mb-10 text-center" />
                        <button onClick={() => {
                            const val = document.getElementById('userName').value;
                            if(val) setState(s => ({...s, user: val.toUpperCase()}));
                        }} className="cyber-btn bg-cyan-500 text-black w-full py-4 text-xl">ACTIVER</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto p-6 relative">
                    {/* Header */}
                    <header className="flex justify-between items-start mb-8 z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={toggleMusic} className="w-12 h-12 glass-panel rounded-full flex items-center justify-center text-xl">
                                {isPlaying ? '🔊' : '🔇'}
                            </button>
                            <div>
                                <h2 className="font-orbitron text-xl font-black leading-none">{state.user}</h2>
                                <p className="text-pink-500 text-[10px] font-black tracking-widest mt-1 uppercase">{title}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="font-orbitron text-3xl font-black">{state.trophies}<span className="text-cyan-400 text-sm ml-1">🏆</span></div>
                            <div className="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Niveau {state.level}</div>
                        </div>
                    </header>

                    {/* Progress Global */}
                    <div className="mb-10 px-2">
                        <div className="flex justify-between text-[9px] font-black uppercase mb-1 text-cyan-500/70">
                            <span>Synchronization XP</span>
                            <span>{state.xp} / {reqXP}</span>
                        </div>
                        <div className="progress-container">
                            <div className="progress-value bg-cyan-400 shadow-[0_0_10px_#00f3ff]" style={{width: `${(state.xp/reqXP)*100}%`}}></div>
                        </div>
                    </div>

                    {/* Main Container */}
                    <main className="flex-1 overflow-y-auto custom-scroll pb-32">
                        <AnimatePresence mode="wait">
                            {tab === 'train' ? (
                                <motion.div key="t" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }} className="space-y-4">
                                    {state.dailyWorkouts >= 2 ? (
                                        <div className="glass-panel p-12 rounded-3xl text-center">
                                            <div className="text-6xl mb-6">🔒</div>
                                            <h3 className="font-orbitron text-xl text-pink-500 mb-2">CAPACITÉ ATTEINTE</h3>
                                            <p className="text-xs text-gray-500 uppercase tracking-widest">Réinitialisation des protocoles à minuit</p>
                                        </div>
                                    ) : (
                                        <>
                                            {/* Quête Secondaire */}
                                            {sideQuest && (
                                                <div className="glass-panel p-5 border-yellow-500/30 bg-yellow-500/5 rounded-2xl flex justify-between items-center animate-pulse">
                                                    <div>
                                                        <p className="text-[10px] font-black text-yellow-500 uppercase mb-1">Boost Latent (+40 XP)</p>
                                                        <p className="font-orbitron text-lg">{sideQuest.r} {sideQuest.ex}</p>
                                                    </div>
                                                    <button onClick={() => { handleXP(40); setSideQuest(null); }} 
                                                        className="bg-yellow-500 text-black p-3 font-black rounded-lg text-xs">OK</button>
                                                </div>
                                            )}

                                            <div className="grid gap-4">
                                                {exercises.map(ex => (
                                                    <motion.div 
                                                        whileTap={{ scale: 0.98 }}
                                                        key={ex.id} 
                                                        onClick={() => setCompleted(c => ({...c, [ex.id]: !c[ex.id]}))}
                                                        className={`glass-panel p-6 rounded-2xl flex justify-between items-center border-l-4 transition-all ${completed[ex.id] ? 'opacity-100 border-white bg-white/10' : 'opacity-60 border-cyan-500'}`}
                                                        style={{ borderLeftColor: completed[ex.id] ? 'white' : ex.c }}
                                                    >
                                                        <div className="flex items-center gap-5">
                                                            <span className="text-4xl">{ex.i}</span>
                                                            <div>
                                                                <p className="text-[10px] font-black uppercase tracking-widest" style={{color: ex.c}}>{ex.n}</p>
                                                                <p className="text-3xl font-orbitron leading-none mt-1">{ex.r}</p>
                                                            </div>
                                                        </div>
                                                        <div className={`w-8 h-8 rounded border-2 flex items-center justify-center ${completed[ex.id] ? 'bg-cyan-500 border-cyan-400' : 'border-white/10'}`}>
                                                            {completed[ex.id] && <span className="text-black font-black">✓</span>}
                                                        </div>
                                                    </motion.div>
                                                ))}
                                            </div>

                                            <button 
                                                onClick={finalizeSession}
                                                className={`w-full py-6 mt-6 cyber-btn text-xl font-black ${Object.keys(completed).length === 4 ? 'bg-white text-black' : 'bg-white/5 text-white/20'}`}
                                            >
                                                TRANSMETTRE DONNÉES
                                            </button>
                                        </>
                                    )}
                                </motion.div>
                            ) : (
                                <motion.div key="p" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="text-center">
                                    <EvolutionAvatar level={state.level} isCali={isCali} />
                                    
                                    <div className="mt-8 space-y-4">
                                        <div className="glass-panel p-6 rounded-3xl">
                                            <h4 className="font-orbitron text-2xl font-black text-white">{state.user}</h4>
                                            <div className="h-0.5 w-16 bg-cyan-500 mx-auto my-3"></div>
                                            <p className="text-[10px] text-gray-500 uppercase tracking-[0.5em] font-black">Pilote de Rang S</p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="glass-panel p-5 rounded-2xl">
                                                <p className="text-[10px] text-gray-500 uppercase font-black mb-1">Total Sessions</p>
                                                <p className="text-3xl font-orbitron text-cyan-400">{state.totalSessions}</p>
                                            </div>
                                            <div className="glass-panel p-5 rounded-2xl">
                                                <p className="text-[10px] text-gray-500 uppercase font-black mb-1">Série Actuelle</p>
                                                <p className="text-3xl font-orbitron text-pink-500">{state.streak}j</p>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => { if(confirm("FORMATEUR LE NOYAU ?")) { localStorage.clear(); location.reload(); }}}
                                            className="w-full p-4 border border-pink-500/30 text-pink-500 font-orbitron text-xs tracking-widest rounded-2xl mt-12 opacity-40 hover:opacity-100 transition-opacity"
                                        >
                                            HARD_RESET_CORE
                                        </button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Navbar */}
                    <nav className="fixed bottom-8 left-8 right-8 h-20 glass-panel rounded-3xl flex items-center justify-around z-50 border border-white/10">
                        <button onClick={() => setTab('train')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'train' ? 'text-cyan-400 scale-110' : 'opacity-30'}`}>
                            <span className="text-2xl">⚡</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Combat</span>
                        </button>
                        <button onClick={() => setTab('profile')} className={`flex flex-col items-center gap-1 transition-all ${tab === 'profile' ? 'text-cyan-400 scale-110' : 'opacity-30'}`}>
                            <span className="text-2xl">💾</span>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Système</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
        }
    </script>
</body>
</html>
